<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Full Admin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-bottom: 120px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #F1F5F9; min-width: 110px; }
        .table-scroll { overflow-x: auto; border-radius: 1.5rem; border: 1px solid #E2E8F0; background: white; }
        nav button.active { color: #064E3B; transform: translateY(-5px); }
        nav button { color: #94A3B8; transition: all 0.3s; }
        .modern-in { width:100%; padding:14px; background:#F1F5F9; border:1px solid #E2E8F0; border-radius:1rem; outline:none; font-size: 13px; font-weight: 600; color: #1E293B; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(4px); }
        .card-pon { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="mainApp" class="max-w-md mx-auto p-5">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-white shadow-lg shadow-emerald-900/20">
                <span class="material-symbols-rounded">account_balance_wallet</span>
            </div>
            <h1 class="text-xl font-black text-emerald-900 tracking-tighter uppercase">Tuntas.</h1>
        </div>
        <button onclick="location.reload()" class="w-10 h-10 rounded-xl border flex items-center justify-center text-slate-400"><span class="material-symbols-rounded">sync</span></button>
    </header>

    <div id="screen-home" class="tab-content active space-y-4">
        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-xl">
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Total Saldo Bersih</p>
            <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
        </div>

        <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center px-1">
                <p class="text-[10px] font-bold text-slate-400 uppercase">Filter</p>
                <button onclick="loadData()" class="text-[10px] font-bold text-emerald-600 uppercase">Terapkan</button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="fStart" class="modern-in !py-2 text-[11px]">
                <input type="date" id="fEnd" class="modern-in !py-2 text-[11px]">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm"><p class="text-[9px] font-bold text-emerald-500 uppercase">Pemasukan</p><p id="totalMasuk" class="text-lg font-black text-slate-800">0</p></div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm"><p class="text-[9px] font-bold text-red-500 uppercase">Pengeluaran</p><p id="totalKeluar" class="text-lg font-black text-slate-800">0</p></div>
        </div>

        <button onclick="openModal('mKas')" class="w-full bg-white border-2 border-emerald-900 text-emerald-900 p-4 rounded-3xl font-black text-xs uppercase">Catat Kas Umum</button>
        <div id="listRiwayat" class="space-y-2 pt-2"></div>
    </div>

    <div id="screen-warga" class="tab-content space-y-4">
        <div class="flex justify-between items-end px-1">
            <h3 class="font-black text-emerald-900 uppercase text-lg">Warga</h3>
            <button onclick="openModal('mAnggota')" class="bg-emerald-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Warga</button>
        </div>
        <div id="tBodyWarga" class="space-y-2"></div>
    </div>

    <div id="screen-pon" class="tab-content space-y-5">
        <div class="p-8 card-pon rounded-[2.5rem] text-white shadow-xl">
            <p class="text-[10px] font-bold opacity-60 uppercase">Saldo PON</p>
            <h2 id="totalPon" class="text-4xl font-black mt-1">Rp 0</h2>
        </div>
        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-3">
            <div class="grid grid-cols-2 gap-2"><input type="date" id="pTgl" class="modern-in"><select id="pKat" class="modern-in"><option value="Masuk">Masuk</option><option value="Keluar">Keluar</option></select></div>
            <input type="text" id="pKet" class="modern-in uppercase" placeholder="Keterangan PON">
            <input type="number" id="pNom" class="modern-in font-bold" placeholder="Nominal Rp">
            <button onclick="simpanPon()" class="w-full bg-emerald-950 text-white p-4 rounded-xl font-black text-xs uppercase">Simpan Transaksi</button>
        </div>
        <div id="listPon" class="space-y-3"></div>
    </div>

    <div id="screen-rekap" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase">Rekap Iuran (Nama Lengkap)</h3>
        <div class="table-scroll">
            <table class="w-full text-left text-[11px]">
                <thead><tr id="th-rekap" class="text-slate-400 uppercase font-black"><th class="sticky-col p-4 bg-white">Nama</th></tr></thead>
                <tbody id="tb-rekap"></tbody>
                <tfoot id="tf-rekap" class="bg-emerald-50 font-black text-emerald-900"></tfoot>
            </table>
        </div>
    </div>

    <div id="screen-bayar" class="tab-content space-y-4">
        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-4">
            <h3 class="font-black text-emerald-900 uppercase text-center">Input Iuran</h3>
            <input type="date" id="iTgl" class="modern-in">
            <select id="iNama" class="modern-in font-bold"></select>
            <div id="gridBulan" class="grid grid-cols-3 gap-2"></div>
            <input type="number" id="iNom" class="modern-in font-black text-2xl text-emerald-700 text-center" placeholder="0">
            <button onclick="simpanIuran()" class="w-full bg-emerald-900 text-white p-5 rounded-2xl font-black uppercase text-xs">Simpan & WA</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-4 z-50">
        <button onclick="st('home')" id="n-home" class="active flex flex-col items-center gap-1"><span class="material-symbols-rounded">dashboard</span><span class="text-[9px] font-bold">HOME</span></button>
        <button onclick="st('warga')" id="n-warga" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">group</span><span class="text-[9px] font-bold">WARGA</span></button>
        <button onclick="st('pon')" id="n-pon" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">menu_book</span><span class="text-[9px] font-bold">PON</span></button>
        <button onclick="st('rekap')" id="n-rekap" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">analytics</span><span class="text-[9px] font-bold">REKAP</span></button>
        <button onclick="st('bayar')" id="n-bayar" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">payments</span><span class="text-[9px] font-bold">BAYAR</span></button>
    </nav>
</div>

<div id="mKas" class="modal" onclick="if(event.target==this)closeModal('mKas')"><div class="modal-content bg-white p-6 rounded-3xl w-full max-w-xs space-y-3"><input type="date" id="kTgl" class="modern-in"><select id="kKat" class="modern-in"><option value="Masuk">Masuk</option><option value="Keluar">Keluar</option></select><input type="text" id="kKet" class="modern-in" placeholder="Keterangan"><input type="number" id="kNom" class="modern-in" placeholder="Nominal"><button onclick="simpanKas()" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black uppercase">Simpan</button></div></div>
<div id="mAnggota" class="modal" onclick="if(event.target==this)closeModal('mAnggota')"><div class="modal-content bg-white p-6 rounded-3xl w-full max-w-xs space-y-3"><input type="text" id="aNama" class="modern-in uppercase" placeholder="Nama Warga"><input type="number" id="aHp" class="modern-in" placeholder="628xxx"><button onclick="simpanAnggota()" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black uppercase">Tambah</button></div></div>

<script>
    const config = {
        apiKey: "AIzaSyDjxOJZeiLHaxoaS3-hVdbIGfIXCfCT2Is",
        authDomain: "tuntas-sekawan.firebaseapp.com",
        projectId: "tuntas-sekawan",
        storageBucket: "tuntas-sekawan.firebasestorage.app",
        messagingSenderId: "1090506516563",
        appId: "1:1090506516563:web:63c429677caea28addfea6"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni"];
    let dataWarga = {};

    function init() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('iTgl').value = today;
        document.getElementById('pTgl').value = today;
        document.getElementById('kTgl').value = today;
        const grid = document.getElementById('gridBulan'); grid.innerHTML = '';
        daftarBulan.forEach(bln => { grid.innerHTML += `<label class="relative block"><input type="checkbox" name="blnCek" value="${bln}" class="hidden peer"><div class="cursor-pointer text-[9px] font-black py-3 text-center border rounded-xl bg-white text-slate-300 peer-checked:bg-emerald-900 peer-checked:text-white uppercase transition-all">${bln.substring(0,3)}</div></label>`; });
        loadData();
    }

    async function loadData() {
        const [dkas, diur, dang, dpon] = await Promise.all([db.collection("kas").get(), db.collection("pembayaran").get(), db.collection("anggota").orderBy("nama","asc").get(), db.collection("pon").get()]);
        const sVal = document.getElementById('fStart').value, eVal = document.getElementById('fEnd').value;
        const s = sVal ? new Date(sVal) : null, e = eVal ? new Date(eVal) : null; if(e) e.setHours(23,59,59);

        let saldoAwal = 0, tInFiltered = 0, tOutFiltered = 0, allTrx = [];
        const ti=document.getElementById('tBodyWarga'), tr=document.getElementById('tb-rekap'), tf=document.getElementById('tf-rekap'), sel=document.getElementById('iNama'), listR = document.getElementById('listRiwayat'), th = document.getElementById('th-rekap');
        
        ti.innerHTML=''; tr.innerHTML=''; listR.innerHTML=''; sel.innerHTML='<option value="">Pilih Warga</option>';
        th.innerHTML = '<th class="sticky-col p-4 bg-white">Nama</th>';
        let footerTotals = {}; 
        daftarBulan.forEach(b => { th.innerHTML += `<th class="p-3 text-center text-slate-400 font-bold">${b.substring(0,3)}</th>`; footerTotals[b] = 0; });

        const iuranArr = diur.docs.map(doc => ({id: doc.id, ...doc.data()}));
        dkas.docs.forEach(doc => { const d = doc.data(); allTrx.push({ id: doc.id, col: 'kas', ket: d.ket, nom: Number(d.nom), kat: d.kat, tgl: d.tgl.toDate() }); });
        
        // Perbaikan: Hapus tulisan "IURAN"
        iuranArr.forEach(d => { allTrx.push({ id: d.id, col: 'pembayaran', ket: `${(d.nama||'')}`, nom: Number(d.nom), kat: 'Masuk', tgl: d.tgl ? d.tgl.toDate() : new Date() }); });

        allTrx.forEach(tx => {
            const isM = tx.kat === 'Masuk';
            if (s && tx.tgl < s) saldoAwal += isM ? tx.nom : -tx.nom;
            else if ((!s || tx.tgl >= s) && (!e || tx.tgl <= e)) { if (isM) tInFiltered += tx.nom; else tOutFiltered += tx.nom; }
        });

        document.getElementById('totalSaldo').innerText = 'Rp ' + (saldoAwal + tInFiltered - tOutFiltered).toLocaleString('id-ID');
        document.getElementById('totalMasuk').innerText = 'Rp ' + tInFiltered.toLocaleString('id-ID');
        document.getElementById('totalKeluar').innerText = 'Rp ' + tOutFiltered.toLocaleString('id-ID');

        allTrx.sort((a,b) => b.tgl - a.tgl).filter(tx => (!s || tx.tgl >= s) && (!e || tx.tgl <= e)).forEach(tx => {
            const isM = tx.kat === 'Masuk';
            listR.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 mb-2"><div><p class="text-xs font-black uppercase text-slate-700">${tx.ket}</p></div><div class="text-right flex items-center gap-2"><p class="font-black text-xs ${isM?'text-emerald-700':'text-red-600'}">${tx.nom.toLocaleString()}</p><button onclick="hapus('${tx.col}','${tx.id}')" class="text-slate-200"><span class="material-symbols-rounded text-sm">delete</span></button></div></div>`);
        });

        dang.docs.forEach(doc => {
            const d = doc.data(); const n = (d.nama || "").trim().toUpperCase(); dataWarga[n] = d.hp || '';
            sel.insertAdjacentHTML('beforeend', `<option value="${n}">${n}</option>`);
            ti.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 mb-2"><div><p class="font-black text-xs uppercase text-slate-700">${n}</p></div><button onclick="hapus('anggota','${doc.id}')" class="text-red-200"><span class="material-symbols-rounded">delete</span></button></div>`);
            
            // Perbaikan: Nama Lengkap di Rekap
            let row = `<tr><td class="sticky-col p-4 font-bold text-slate-700 bg-white border-b uppercase">${n}</td>`;
            daftarBulan.forEach(bln => {
                const lunas = iuranArr.filter(k => (k.nama||"").toUpperCase() === n && (k.bulan||"").includes(bln));
                if(lunas.length > 0) {
                    let nomBln = 0; lunas.forEach(l => nomBln += (Number(l.nom) / (l.bulan||"").split(',').length));
                    row += `<td class="text-center text-emerald-600 font-black">${(nomBln/1000).toFixed(0)}K</td>`;
                    footerTotals[bln] += nomBln;
                } else row += `<td class="text-center text-slate-200">-</td>`;
            });
            tr.insertAdjacentHTML('beforeend', row + `</tr>`);
        });

        let ftRow = `<tr><td class="sticky-col p-4 font-black bg-emerald-50 text-emerald-900 uppercase text-[10px]">TOTAL</td>`;
        daftarBulan.forEach(bln => { ftRow += `<td class="text-center p-4 bg-emerald-50 text-emerald-800 font-black">${(footerTotals[bln]/1000).toFixed(0)}K</td>`; });
        tf.innerHTML = ftRow + `</tr>`;

        let totalPon = 0; const lp = document.getElementById('listPon'); lp.innerHTML = '';
        dpon.docs.forEach(doc => {
            const d = doc.data(); const isM = d.kat === 'Masuk'; totalPon += isM ? Number(d.nom) : -Number(d.nom);
            lp.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl border border-slate-50 flex justify-between mb-2"><div><p class="text-xs font-black uppercase">${d.ket}</p></div><div class="flex items-center gap-2"><p class="${isM?'text-emerald-600':'text-red-600'} font-black text-xs">${Number(d.nom).toLocaleString()}</p><button onclick="hapus('pon','${doc.id}')" class="text-slate-100"><span class="material-symbols-rounded text-sm">delete</span></button></div></div>`);
        });
        document.getElementById('totalPon').innerText = 'Rp ' + totalPon.toLocaleString('id-ID');
    }

    async function simpanIuran() {
        const n = document.getElementById('iNama').value, nmn = Number(document.getElementById('iNom').value), tglVal = document.getElementById('iTgl').value;
        const blns = Array.from(document.querySelectorAll('input[name="blnCek"]:checked')).map(c => c.value);
        if(!n || !nmn || blns.length === 0) return Swal.fire('Error','Lengkapi data!','error');
        const kode = "T-" + Math.floor(100000 + Math.random() * 900000); 
        await db.collection("pembayaran").doc(kode).set({ nama: n, bulan: blns.join(","), nom: nmn, tgl: new Date(tglVal), kode: kode }); 
        Swal.fire('Sukses','Tersimpan','success'); loadData();
        const hp = (dataWarga[n]||'').replace(/^0/,'62');
        const link = window.location.origin + window.location.pathname.replace('kastuntas.html','') + `kuitansi.html?id=${kode}`;
        window.open(`https://wa.me/${hp}?text=Terimakasih *${n}*, Iuran *${blns.join(", ")}* sebesar *Rp ${nmn.toLocaleString()}* telah diterima.%0ACek Kuitansi: ${link}`);
    }

    async function simpanPon() { const tgl = document.getElementById('pTgl').value, kat = document.getElementById('pKat').value, ket = document.getElementById('pKet').value, nom = Number(document.getElementById('pNom').value); if(!ket || !nom) return; await db.collection("pon").add({ kat, ket: ket.toUpperCase(), nom, tgl: new Date(tgl) }); document.getElementById('pKet').value = ''; document.getElementById('pNom').value = ''; loadData(); }
    async function simpanKas() { const tgl = document.getElementById('kTgl').value, kat = document.getElementById('kKat').value, ket = document.getElementById('kKet').value, nom = Number(document.getElementById('kNom').value); if(!ket || !nom) return; await db.collection("kas").add({ kat, ket, nom, tgl: new Date(tgl) }); closeModal('mKas'); loadData(); }
    async function simpanAnggota() { const n = document.getElementById('aNama').value.trim().toUpperCase(), h = document.getElementById('aHp').value; if(n) { await db.collection("anggota").add({ nama: n, hp: h }); closeModal('mAnggota'); loadData(); } }
    async function hapus(c, id) { if(confirm("Hapus data ini?")) { await db.collection(c).doc(id).delete(); loadData(); } }
    function st(t) { document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('screen-'+t).classList.add('active'); document.querySelectorAll('nav button').forEach(b => b.classList.remove('active')); document.getElementById('n-'+t).classList.add('active'); }
    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    init();
</script>
</body>
                </html>
