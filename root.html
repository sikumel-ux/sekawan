<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#064E3B">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Admin</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="pon/pon-style.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-bottom: 100px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #F1F5F9; min-width: 90px; }
        .table-scroll { overflow-x: auto; border-radius: 1rem; border: 1px solid #E2E8F0; background: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        nav button.active { color: #064E3B; transform: translateY(-5px); }
        nav button { color: #94A3B8; transition: all 0.3s; }
        .modern-in { width:100%; padding:14px; background:#F1F5F9; border:1px solid #E2E8F0; border-radius:1rem; outline:none; font-size: 13px; font-weight: 600; color: #1E293B; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(4px); }
    </style>
</head>
<body>

<div id="mainApp" class="max-w-md mx-auto p-5">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-white"><span class="material-symbols-rounded">wallet</span></div>
            <h1 class="text-xl font-black text-emerald-900">Tuntas.</h1>
        </div>
    </header>

    <div id="screen-home" class="tab-content active space-y-4">
        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-xl">
            <p class="text-[10px] font-bold opacity-60 uppercase">Total Saldo Kas</p>
            <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
        </div>
        <div id="listRiwayat" class="space-y-2 pt-4"></div>
    </div>

    <div id="screen-warga" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase px-1">Daftar Warga</h3>
        <div id="tBodyWarga" class="space-y-2"></div>
    </div>

    <div id="screen-pon" class="tab-content space-y-5">
        <div class="p-8 bg-emerald-950 rounded-[2.5rem] text-white shadow-xl">
            <p class="text-[10px] font-bold opacity-60 uppercase">Saldo PON</p>
            <h2 id="totalPon" class="text-4xl font-black mt-1">Rp 0</h2>
        </div>
        <div id="listPon" class="space-y-3"></div>
    </div>

    <div id="screen-rekap" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase px-1">Rekap Iuran</h3>
        <div class="table-scroll">
            <table class="w-full text-left text-[11px]">
                <thead><tr id="th-rekap" class="text-slate-400 uppercase font-black"><th class="sticky-col p-4 bg-white">Nama</th></tr></thead>
                <tbody id="tb-rekap"></tbody>
            </table>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-4 z-50">
        <button onclick="st('home')" id="n-home" class="active flex flex-col items-center gap-1"><span class="material-symbols-rounded">dashboard</span><span class="text-[9px] font-bold">HOME</span></button>
        <button onclick="st('warga')" id="n-warga" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">group</span><span class="text-[9px] font-bold">WARGA</span></button>
        <button onclick="st('pon')" id="n-pon" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">menu_book</span><span class="text-[9px] font-bold">PON</span></button>
        <button onclick="st('rekap')" id="n-rekap" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">analytics</span><span class="text-[9px] font-bold">REKAP</span></button>
    </nav>
</div>

<script>
    // Konfigurasi Firebase Anda
    const config = {
        apiKey: "AIzaSyDjxOJZeiLHaxoaS3-hVdbIGfIXCfCT2Is",
        authDomain: "tuntas-sekawan.firebaseapp.com",
        projectId: "tuntas-sekawan",
        storageBucket: "tuntas-sekawan.firebasestorage.app",
        messagingSenderId: "1090506516563",
        appId: "1:1090506516563:web:63c429677caea28addfea6"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni"];

    async function loadData() {
        // Ambil SEMUA data dari Firestore
        const [dkas, diur, dang, dpon] = await Promise.all([
            db.collection("kas").get(), 
            db.collection("pembayaran").get(), 
            db.collection("anggota").orderBy("nama","asc").get(),
            db.collection("pon").get()
        ]);

        // 1. Render Warga & Siapkan Rekap
        const ti = document.getElementById('tBodyWarga');
        const tr = document.getElementById('tb-rekap');
        const th = document.getElementById('th-rekap');
        ti.innerHTML = ''; tr.innerHTML = ''; th.innerHTML = '<th class="sticky-col p-4 bg-white">Nama</th>';
        
        daftarBulan.forEach(b => th.innerHTML += `<th class="p-3 text-center">${b.substring(0,3)}</th>`);

        const iuranArr = diur.docs.map(doc => doc.data());

        dang.docs.forEach(doc => {
            const d = doc.data();
            const nama = (d.nama || "").toUpperCase();
            ti.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm"><p class="font-black text-xs text-slate-700">${nama}</p></div>`);

            // Baris Rekap per Warga
            let row = `<tr><td class="sticky-col p-4 font-bold bg-white border-b uppercase">${nama.split(' ')[0]}</td>`;
            daftarBulan.forEach(bln => {
                const lunas = iuranArr.find(i => (i.nama||"").toUpperCase() === nama && (i.bulan||"").includes(bln));
                row += `<td class="text-center ${lunas ? 'text-emerald-600 font-black' : 'text-slate-200'}">${lunas ? 'OK' : '-'}</td>`;
            });
            tr.insertAdjacentHTML('beforeend', row + `</tr>`);
        });

        // 2. Render Data PON
        let totalPon = 0;
        const lp = document.getElementById('listPon');
        lp.innerHTML = '';
        dpon.docs.forEach(doc => {
            const d = doc.data();
            const isM = d.kat === 'Masuk';
            totalPon += isM ? Number(d.nom) : -Number(d.nom);
            lp.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl border border-slate-50 flex justify-between"><div><p class="text-xs font-black">${d.ket}</p></div><p class="${isM?'text-emerald-600':'text-red-600'} font-black text-xs">${isM?'+':'-'} ${Number(d.nom).toLocaleString()}</p></div>`);
        });
        document.getElementById('totalPon').innerText = 'Rp ' + totalPon.toLocaleString('id-ID');

        // 3. Saldo Utama
        let tIn = 0, tOut = 0;
        dkas.docs.forEach(doc => {
            const d = doc.data();
            if(d.kat==='Masuk') tIn += Number(d.nom); else tOut += Number(d.nom);
        });
        document.getElementById('totalSaldo').innerText = 'Rp ' + (tIn - tOut).toLocaleString('id-ID');
    }

    function st(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('screen-'+t).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('n-'+t).classList.add('active');
    }

    // Jalankan loadData saat pertama buka
    loadData();
</script>

<script src="pon/pon-script.js"></script>

</body>
</html>
