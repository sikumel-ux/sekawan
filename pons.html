<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS ADMIN - ALL IN ONE</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-bottom: 120px; }
        .modern-in { width: 100%; padding: 14px; background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 1rem; outline: none; font-size: 13px; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #F1F5F9; min-width: 120px; }
        .table-scroll { overflow-x: auto; border-radius: 1.5rem; border: 1px solid #E2E8F0; background: white; }
        nav button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94A3B8; }
        nav button.active { color: #064E3B; font-weight: 800; }
        nav button#n-pon.active { color: #EA580C; }
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto p-5">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-white"><span class="material-symbols-rounded">wallet</span></div>
            <h1 class="text-xl font-black text-emerald-900 uppercase">Tuntas.</h1>
        </div>
    </header>

    <div id="screen-home" class="tab-content active space-y-4">
        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Saldo Utama</p>
            <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="st('bayar')" class="bg-white p-4 rounded-3xl border flex flex-col items-center gap-1 font-black text-[10px] text-slate-600 uppercase"><span class="material-symbols-rounded text-emerald-600">payments</span>Iuran</button>
            <button onclick="openModal('mKas')" class="bg-white p-4 rounded-3xl border flex flex-col items-center gap-1 font-black text-[10px] text-slate-600 uppercase"><span class="material-symbols-rounded text-emerald-900">add_card</span>Kas Umum</button>
        </div>
        <div class="pt-2">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest px-1">Histori Kas</h3>
            <div id="listRiwayat" class="space-y-2"></div>
        </div>
    </div>

    <div id="screen-warga" class="tab-content space-y-4">
        <div class="flex justify-between items-center">
            <h3 class="font-black text-emerald-900 uppercase">Daftar Warga</h3>
            <button onclick="openModal('mAnggota')" class="bg-emerald-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Tambah</button>
        </div>
        <div id="tBodyWarga" class="space-y-2"></div>
    </div>

    <div id="screen-rekap" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase">Rekap Iuran</h3>
        <div class="table-scroll">
            <table class="w-full text-[10px]">
                <thead><tr id="th-rekap" class="text-slate-400 uppercase border-b"></tr></thead>
                <tbody id="tb-rekap"></tbody>
            </table>
        </div>
    </div>

    <div id="screen-bayar" class="tab-content space-y-4">
        <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
            <h3 class="font-black text-center text-emerald-900 uppercase">Input Iuran</h3>
            <input type="date" id="iTgl" class="modern-in">
            <select id="iNama" class="modern-in font-bold uppercase"></select>
            <div id="gridBulan" class="grid grid-cols-3 gap-2"></div>
            <input type="number" id="iNom" class="modern-in text-center text-xl font-black" placeholder="NOMINAL RP">
            <button onclick="simpanIuran()" class="w-full bg-emerald-900 text-white p-4 rounded-2xl font-black uppercase text-xs">Simpan & Cetak</button>
        </div>
    </div>

    <div id="screen-pon" class="tab-content space-y-4">
        <div class="bg-slate-900 p-7 rounded-[2.5rem] text-white shadow-xl">
            <p class="text-[10px] font-bold opacity-50 uppercase">Saldo PON</p>
            <h2 id="totalPon" class="text-3xl font-black text-orange-400 mt-1">Rp 0</h2>
        </div>
        <div class="bg-white p-6 rounded-[2.5rem] border border-orange-100 space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="pTgl" class="modern-in">
                <select id="pKat" class="modern-in"><option value="Masuk">MASUK</option><option value="Keluar">KELUAR</option></select>
            </div>
            <input type="text" id="pKet" class="modern-in uppercase" placeholder="KETERANGAN">
            <input type="number" id="pNom" class="modern-in font-black" placeholder="RP">
            <button onclick="simpanPon()" class="w-full bg-orange-600 text-white p-4 rounded-2xl font-black uppercase text-xs">Simpan PON</button>
        </div>
        <div id="listPon" class="space-y-2"></div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-1 z-50">
        <button onclick="st('home')" id="n-home" class="active"><span class="material-symbols-rounded">home</span><span class="text-[8px]">HOME</span></button>
        <button onclick="st('warga')" id="n-warga"><span class="material-symbols-rounded">group</span><span class="text-[8px]">WARGA</span></button>
        <button onclick="st('pon')" id="n-pon"><div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600"><span class="material-symbols-rounded">book</span></div><span class="text-[8px] text-orange-600 font-bold">PON</span></button>
        <button onclick="st('rekap')" id="n-rekap"><span class="material-symbols-rounded">analytics</span><span class="text-[8px]">REKAP</span></button>
        <button onclick="st('bayar')" id="n-bayar"><span class="material-symbols-rounded">payments</span><span class="text-[8px]">BAYAR</span></button>
    </nav>
</div>

<div id="mKas" class="hidden modal-overlay fixed inset-0 items-center justify-center p-6 z-[100]" onclick="if(event.target==this)closeModal('mKas')">
    <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-sm space-y-3">
        <h3 class="font-black text-center uppercase">Kas Umum</h3>
        <input type="date" id="kTgl" class="modern-in">
        <select id="kKat" class="modern-in"><option value="Masuk">MASUK</option><option value="Keluar">KELUAR</option></select>
        <input type="text" id="kKet" class="modern-in uppercase" placeholder="KETERANGAN">
        <input type="number" id="kNom" class="modern-in font-black" placeholder="RP">
        <button onclick="simpanKas()" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black">SIMPAN</button>
    </div>
</div>

<div id="mAnggota" class="hidden modal-overlay fixed inset-0 items-center justify-center p-6 z-[100]" onclick="if(event.target==this)closeModal('mAnggota')">
    <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-sm space-y-3">
        <h3 class="font-black text-center uppercase">Tambah Warga</h3>
        <input type="text" id="aNama" class="modern-in uppercase" placeholder="NAMA LENGKAP">
        <input type="number" id="aHp" class="modern-in" placeholder="WA (628...)">
        <button onclick="simpanAnggota()" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black">SIMPAN WARGA</button>
    </div>
</div>

<div id="mKuitansi" class="hidden modal-overlay fixed inset-0 items-center justify-center p-6 z-[200]">
    <div class="bg-white p-8 rounded-3xl w-full max-w-sm border-2 border-emerald-900 relative">
        <div class="text-center border-b pb-4 mb-4">
            <h2 class="font-black text-emerald-900">KUITANSI TUNTAS</h2>
            <p class="text-[8px] text-slate-400" id="kui-tgl"></p>
        </div>
        <div class="space-y-2 text-xs">
            <div class="flex justify-between"><span>Nama:</span><span id="kui-nama" class="font-black uppercase"></span></div>
            <div class="flex justify-between"><span>Untuk:</span><span id="kui-bln" class="font-bold"></span></div>
            <div class="flex justify-between border-t pt-2 mt-4 text-lg font-black text-emerald-700"><span>TOTAL:</span><span id="kui-nom"></span></div>
        </div>
        <button onclick="closeModal('mKuitansi')" class="mt-6 w-full bg-slate-100 p-3 rounded-xl font-bold text-xs">TUTUP</button>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyDjxOJZeiLHaxoaS3-hVdbIGfIXCfCT2Is",
        authDomain: "tuntas-sekawan.firebaseapp.com",
        projectId: "tuntas-sekawan",
        storageBucket: "tuntas-sekawan.firebasestorage.app",
        messagingSenderId: "1090506516563",
        appId: "1:1090506516563:web:63c429677caea28addfea6"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni"];

    document.addEventListener('DOMContentLoaded', () => {
        initUI();
        loadData();
        loadPon();
    });

    function initUI() {
        const grid = document.getElementById('gridBulan');
        const thr = document.getElementById('th-rekap');
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('iTgl').value = today;
        document.getElementById('kTgl').value = today;
        document.getElementById('pTgl').value = today;

        thr.innerHTML = '<th class="sticky-col p-4 bg-white">WARGA</th>';
        grid.innerHTML = '';
        daftarBulan.forEach(bln => {
            grid.innerHTML += `<label class="relative"><input type="checkbox" name="blnCek" value="${bln}" class="hidden peer"><div class="cursor-pointer text-[8px] font-black py-3 text-center border rounded-xl bg-white text-slate-300 peer-checked:bg-emerald-900 peer-checked:text-white uppercase">${bln.substring(0,3)}</div></label>`;
            thr.innerHTML += `<th class="p-3 text-center text-slate-400">${bln.substring(0,3)}</th>`;
        });
    }

    // LOGIKA DATA UTAMA
    async function loadData() {
        const [dkas, diur, dang] = await Promise.all([
            db.collection("kas").get(), db.collection("pembayaran").get(), db.collection("anggota").orderBy("nama","asc").get()
        ]);
        let tIn=0, tOut=0, tIur=0, allTrx = [];
        const ti=document.getElementById('tBodyWarga'), tr=document.getElementById('tb-rekap'), sel=document.getElementById('iNama'), listR = document.getElementById('listRiwayat');
        
        ti.innerHTML=''; tr.innerHTML=''; sel.innerHTML='<option value="">PILIH WARGA</option>'; listR.innerHTML='';
        const iuranArr = diur.docs.map(doc => ({...doc.data()}));

        dkas.docs.forEach(doc => {
            const d = doc.data(); const n = Number(d.nom || 0);
            if(d.kat==='Masuk') tIn+=n; else tOut+=n;
            allTrx.push({ ket: d.ket, nom: n, kat: d.kat, tgl: d.tgl.toDate() });
        });

        iuranArr.forEach(d => {
            const n = Number(d.nom || 0); tIur += n;
            allTrx.push({ ket: `IURAN: ${d.nama}`, nom: n, kat: 'Masuk', tgl: d.tgl ? d.tgl.toDate() : new Date() });
        });

        document.getElementById('totalSaldo').innerText = 'Rp ' + ((tIn + tIur) - tOut).toLocaleString('id-ID');

        allTrx.sort((a,b) => b.tgl - a.tgl).slice(0, 6).forEach(tx => {
            const isM = tx.kat === 'Masuk';
            listR.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm"><div class="flex gap-3 items-center"><div class="w-8 h-8 rounded-lg ${isM?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'} flex items-center justify-center font-black text-[9px]">${isM?'IN':'OUT'}</div><div><p class="text-[10px] font-black uppercase text-slate-700 leading-tight">${tx.ket}</p><p class="text-[8px] text-slate-300 font-bold">${tx.tgl.toLocaleDateString('id-ID')}</p></div></div><p class="font-black text-xs ${isM?'text-emerald-700':'text-red-600'}">${isM?'+':'-'} ${tx.nom.toLocaleString()}</p></div>`);
        });

        dang.docs.forEach(doc => {
            const d = doc.data(); const n = d.nama.toUpperCase();
            sel.insertAdjacentHTML('beforeend', `<option value="${n}">${n}</option>`);
            ti.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm"><p class="font-black text-[11px] text-slate-700 uppercase">${n}</p><button onclick="hapus('anggota','${doc.id}')" class="text-slate-300"><span class="material-symbols-rounded">delete</span></button></div>`);

            let row = `<tr><td class="sticky-col p-4 font-black text-slate-700 border-b uppercase">${n}</td>`;
            daftarBulan.forEach(bln => {
                const lunas = iuranArr.filter(k => k.nama === n && k.bulan.includes(bln));
                row += `<td class="text-center p-3 border-b ${lunas.length>0?'text-emerald-600 font-black':'text-slate-100'}">${lunas.length>0?'LUNAS':'-'}</td>`;
            });
            tr.insertAdjacentHTML('beforeend', row + `</tr>`);
        });
    }

    async function simpanIuran() {
        const tgl = document.getElementById('iTgl').value, nama = document.getElementById('iNama').value, nom = Number(document.getElementById('iNom').value);
        const ceks = Array.from(document.querySelectorAll('input[name="blnCek"]:checked')).map(c => c.value);
        if(!nama || !nom || ceks.length === 0) return alert("Lengkapi data!");
        
        const blns = ceks.join(',');
        await db.collection("pembayaran").add({ nama, nom, bulan: blns, tgl: new Date(tgl) });
        
        // Cetak Kuitansi
        document.getElementById('kui-nama').innerText = nama;
        document.getElementById('kui-bln').innerText = blns;
        document.getElementById('kui-nom').innerText = 'Rp ' + nom.toLocaleString();
        document.getElementById('kui-tgl').innerText = new Date(tgl).toLocaleDateString('id-ID', {dateStyle:'full'});
        openModal('mKuitansi');

        document.querySelectorAll('input[name="blnCek"]').forEach(c => c.checked = false);
        document.getElementById('iNom').value = ''; loadData();
    }

    async function simpanAnggota() {
        const nama = document.getElementById('aNama').value.trim().toUpperCase(), hp = document.getElementById('aHp').value;
        if(!nama) return alert("Nama wajib!");
        await db.collection("anggota").add({ nama, hp });
        document.getElementById('aNama').value = ''; closeModal('mAnggota'); loadData();
    }

    // LOGIKA PON
    async function simpanPon() {
        const tgl = document.getElementById('pTgl').value, kat = document.getElementById('pKat').value, ket = document.getElementById('pKet').value.trim().toUpperCase(), nom = Number(document.getElementById('pNom').value);
        if(!ket || !nom) return alert("Isi data!");
        await db.collection("pon_mandiri").add({ tgl: new Date(tgl), kat, ket, nom });
        document.getElementById('pKet').value = ''; document.getElementById('pNom').value = ''; loadPon();
    }

    async function loadPon() {
        const snap = await db.collection("pon_mandiri").orderBy("tgl", "desc").get();
        const list = document.getElementById('listPon'); let total = 0; list.innerHTML = '';
        snap.forEach(doc => {
            const d = doc.data(); const isM = d.kat === 'Masuk';
            if(isM) total += d.nom; else total -= d.nom;
            list.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100"><div class="flex gap-3 items-center"><div class="w-8 h-8 rounded-lg ${isM?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'} flex items-center justify-center font-black text-[9px]">${isM?'IN':'OUT'}</div><div><p class="text-[10px] font-black uppercase text-slate-700">${d.ket}</p><p class="text-[8px] text-slate-300">${d.tgl.toDate().toLocaleDateString('id-ID')}</p></div></div><div class="flex items-center gap-3"><p class="font-black text-xs ${isM?'text-emerald-700':'text-red-600'}">${d.nom.toLocaleString()}</p><button onclick="hapus('pon_mandiri','${doc.id}')" class="text-slate-200"><span class="material-symbols-rounded text-sm">delete</span></button></div></div>`);
        });
        document.getElementById('totalPon').innerText = 'Rp ' + total.toLocaleString('id-ID');
    }

    async function simpanKas() {
        const tgl = document.getElementById('kTgl').value, kat = document.getElementById('kKat').value, ket = document.getElementById('kKet').value.trim().toUpperCase(), nom = Number(document.getElementById('kNom').value);
        if(!ket || !nom) return alert("Lengkapi!");
        await db.collection("kas").add({ tgl: new Date(tgl), kat, ket, nom });
        closeModal('mKas'); loadData();
    }

    async function hapus(coll, id) {
        if(confirm("Hapus data ini?")) {
            await db.collection(coll).doc(id).delete();
            coll === 'pon_mandiri' ? loadPon() : loadData();
        }
    }

    function st(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('screen-' + t).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('n-' + t).classList.add('active');
        window.scrollTo(0,0);
    }
    function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }
</script>
</body>
              </html>
