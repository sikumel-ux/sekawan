<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --tuntas: #059669; }
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .text-tuntas { color: var(--tuntas); }
        .bg-tuntas { background-color: var(--tuntas); }
        .tuntas-shadow { box-shadow: 0 10px 25px -5px rgba(5, 150, 105, 0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        nav button.active { color: var(--tuntas); }
        nav button { color: #94a3b8; transition: all 0.3s; }
        /* Hilangkan scrollbar tapi tetap bisa scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white p-5 sticky top-0 z-30 border-b flex justify-between items-center backdrop-blur-md bg-white/95 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-tuntas rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <i class="fa-brands fa-screenpal text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-none text-tuntas tracking-tight">TUNTAS</h1>
                <p class="text-[9px] font-bold text-tuntas uppercase tracking-widest mt-1">Turun Tangan Atasi Sampah</p>
            </div>
        </div>
    </header>

    <main class="p-6 max-w-md mx-auto">
        
        <section class="mb-6 space-y-4">
            <div class="p-7 bg-tuntas rounded-[2.5rem] text-white tuntas-shadow relative overflow-hidden border-b-4 border-emerald-800">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-70 uppercase tracking-[0.2em]">Total Saldo Kas</p>
                    <h2 id="totalSaldo" class="text-3xl font-extrabold mt-1">Rp 0</h2>
                </div>
                <i class="fa-solid fa-wallet absolute -right-4 -bottom-4 text-7xl opacity-10"></i>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-3xl border border-emerald-50 tuntas-shadow text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total Masuk</p>
                    <p id="totalMasuk" class="text-[13px] font-bold text-emerald-600 mt-1">Rp 0</p>
                </div>
                <div class="bg-white p-4 rounded-3xl border border-emerald-50 tuntas-shadow text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Total Keluar</p>
                    <p id="totalKeluar" class="text-[13px] font-bold text-red-500 mt-1">Rp 0</p>
                </div>
            </div>
        </section>

        <div id="screen-home" class="tab-content active space-y-6">
            <section class="bg-emerald-900 p-7 rounded-[2.5rem] text-white tuntas-shadow relative overflow-hidden border-b-4 border-emerald-950">
                <div class="relative z-10">
                    <h2 class="text-sm font-bold mb-3 flex items-center gap-2 text-emerald-200">
                        <i class="fa-solid fa-leaf text-xs"></i> Tentang TUNTAS
                    </h2>
                    <p class="text-[11px] leading-relaxed opacity-95">
                        <span class="font-bold underline decoration-yellow-400">TUNTAS</span> adalah program swadaya <span class="font-bold">RT 04</span> untuk melokalisir polusi asap.
                    </p>
                </div>
                <i class="fa-solid fa-fire-burner absolute -right-6 -bottom-6 text-8xl opacity-10"></i>
            </section>

            <section class="space-y-3">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Histori Terakhir</h2>
                <div id="listRiwayat" class="space-y-2">
                    <p class="text-[10px] text-center text-slate-400 py-4 italic">Belum ada transaksi</p>
                </div>
            </section>
        </div>

        <div id="screen-history" class="tab-content space-y-4">
            <div class="flex items-center justify-between px-1">
                <h3 class="font-bold text-tuntas text-lg">Semua Riwayat</h3>
                <i class="fa-solid fa-clock-rotate-left text-slate-300"></i>
            </div>
            <div id="listRiwayatLengkap" class="space-y-3">
                </div>
        </div>

        <div id="screen-rekap" class="tab-content space-y-4">
            <h3 class="font-bold text-tuntas text-lg px-1">Laporan Iuran</h3>
            <div class="overflow-x-auto bg-white rounded-3xl border border-slate-100 p-2">
                <table class="w-full text-left text-[11px]">
                    <thead><tr id="th-rekap" class="text-slate-400 uppercase font-bold border-b"></tr></thead>
                    <tbody id="tb-rekap"></tbody>
                </table>
            </div>
        </div>

        <div id="screen-warga" class="tab-content space-y-4">
            <h3 class="font-bold text-tuntas text-lg px-1">Daftar Anggota</h3>
            <div id="tBodyWarga" class="grid grid-cols-1 gap-2"></div>
            <a href="https://wa.me/6285163233482" class="flex items-center gap-3 p-4 bg-tuntas text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all w-full justify-center mt-4">
                <i class="fa-brands fa-whatsapp text-xl"></i>
                <span class="text-xs uppercase tracking-wider">Hubungi Pengelola</span>
            </a>
        </div>
    </main>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white/90 backdrop-blur-md border-t flex justify-around items-center px-4 z-50">
        <button onclick="st('home')" id="n-home" class="active flex flex-col items-center gap-1 flex-1">
            <i class="fa-solid fa-house-chimney text-lg"></i>
            <span class="text-[8px] font-bold uppercase">Beranda</span>
        </button>
        <button onclick="st('history')" id="n-history" class="flex flex-col items-center gap-1 flex-1">
            <i class="fa-solid fa-clock-rotate-left text-lg"></i>
            <span class="text-[8px] font-bold uppercase">Riwayat</span>
        </button>
        <button onclick="st('rekap')" id="n-rekap" class="flex flex-col items-center gap-1 flex-1">
            <i class="fa-solid fa-chart-pie text-lg"></i>
            <span class="text-[8px] font-bold uppercase">Rekap</span>
        </button>
        <button onclick="st('warga')" id="n-warga" class="flex flex-col items-center gap-1 flex-1">
            <i class="fa-solid fa-users text-lg"></i>
            <span class="text-[8px] font-bold uppercase">Anggota</span>
        </button>
    </nav>

    <script>
        // FUNGSI PINDAH HALAMAN (TAB)
        function st(tabName) {
            // Sembunyikan semua screen
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Tampilkan screen tujuan
            document.getElementById('screen-' + tabName).classList.add('active');
            
            // Reset semua tombol nav
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            // Highlight tombol yang diklik
            document.getElementById('n-' + tabName).classList.add('active');

            // Scroll ke atas otomatis
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Contoh penanganan data riwayat (Logika ini nanti masuk ke file JS kamu)

    </script>
</body>
    </html>
