<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#064E3B">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Masuk Aplikasi</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="gaya.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(4px); }
        .modal-content { background:white; padding:24px; border-radius:2rem; width:100%; max-width:400px; animation: popUp 0.2s ease-out; }
        .modern-in { width:100%; padding:14px; background:#F1F5F9; border:1px solid #E2E8F0; border-radius:1rem; outline:none; font-size: 13px; font-weight: 600; color: #1E293B; }
        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:200; align-items:center; justify-content:center; font-weight:bold; color:#064E3B; backdrop-filter: blur(4px); }
        @keyframes popUp {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50">

<!-- LOADING OVERLAY -->
<div id="loading" class="loading-overlay">
    <div class="text-center space-y-2">
        <div class="w-8 h-8 border-4 border-emerald-900 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-xs font-black uppercase tracking-wider text-emerald-950">Memverifikasi Akun...</p>
    </div>
</div>

<!-- MODAL ALERT KUSTOM -->
<div id="customAlert" class="modal" style="z-index: 300;">
    <div class="modal-content text-center space-y-4">
        <div id="alertIcon" class="w-12 h-12 mx-auto rounded-full flex items-center justify-center"></div>
        <h4 id="alertTitle" class="font-black text-slate-800 uppercase text-sm"></h4>
        <p id="alertMsg" class="text-xs font-semibold text-slate-500 leading-relaxed"></p>
        <button id="btnAlertClose" class="w-full bg-slate-900 text-white p-3 rounded-xl font-black uppercase text-xs tracking-wider">Oke</button>
    </div>
</div>

<!-- CONTAINER UTAMA LOGIN -->
<div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-6">
    <div class="flex-1 flex flex-col justify-center w-full my-auto">
        <div class="space-y-6 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm text-center relative z-10">
            
            <!-- LOGO UTAMA -->
            <div class="flex flex-col items-center justify-center pt-2 mb-2">
                <img src="top.png" alt="Logo Login" class="w-64 h-32 object-contain" onerror="this.src='logo.png'">
            </div>

            <div>
                <h2 class="text-2xl font-black text-emerald-900 tracking-tight">MEMBER AREA</h2>
                <p class="text-xs text-slate-400 font-bold mt-1">Masuk dengan Akun Warga RT 04</p>
            </div>
            
            <!-- FORM INPUT -->
            <div class="space-y-3 text-left">
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Nomor WhatsApp / HP</label>
                    <input type="text" id="lHp" class="modern-in mt-1" placeholder="Contoh: 081234xxxx">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Kata Sandi (Password)</label>
                    <div class="relative flex items-center">
                        <input type="password" id="lPass" class="modern-in mt-1 pr-12" placeholder="••••••••">
                        <button type="button" id="btnTogglePass" class="absolute right-4 top-[calc(50%-4px)] text-slate-400 hover:text-slate-600 transition-colors focus:outline-none">
                            <i id="eyeIcon" class="fa-solid fa-eye-slash text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- TOMBOL AKSI -->
            <button id="btnMasukApp" class="w-full bg-emerald-900 text-white p-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all tracking-wider">Masuk Aplikasi</button>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="text-center py-4">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
            &copy; 2026 TUNTAS • RT 04 Dongkelan Bantul.
        </p>
    </div>
</div>

<!-- MODULE CONFIG & LOGIN LOGIC (FIREBASE V12 MODULAR) -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

    // Firebase Config milikmu
    const firebaseConfig = {
        apiKey: "AIzaSyCzz0INhgBUARAxqLlMnCC8vyCciI9jpJk",
        authDomain: "tuntas-04.firebaseapp.com",
        databaseURL: "https://tuntas-04-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "tuntas-04",
        storageBucket: "tuntas-04.firebasestorage.app",
        messagingSenderId: "509433415219",
        appId: "1:509433415219:web:e485a0eab1a612fda64546"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const dbFirebase = getDatabase(app);

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function tuntasAlert(title, message, type = 'success') {
        const el = document.getElementById('customAlert');
        const icon = document.getElementById('alertIcon');
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMsg').innerText = message;
        
        if (type === 'error') {
            icon.className = "w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-red-50 text-red-600";
            icon.innerHTML = '<span class="material-symbols-rounded">gpp_maybe</span>';
        } else {
            icon.className = "w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-emerald-50 text-emerald-600";
            icon.innerHTML = '<span class="material-symbols-rounded">check_circle</span>';
        }
        el.style.display = 'flex';
    }

    window.closeAlert = function() {
        document.getElementById('customAlert').style.display = 'none';
    }

    window.togglePasswordLogin = function() {
        const p = document.getElementById('lPass');
        const icon = document.getElementById('eyeIcon');
        if(p.type === 'password') {
            p.type = 'text';
            icon.className = "fa-solid fa-eye text-sm";
        } else {
            p.type = 'password';
            icon.className = "fa-solid fa-eye-slash text-sm";
        }
    }

    // Fungsi Utama Autentikasi
    function prosesAutentikasiLogin() {
        let inputHp = document.getElementById('lHp').value.trim();
        const inputPass = document.getElementById('lPass').value.trim();

        if (!inputHp || !inputPass) {
            tuntasAlert("Gagal", "Nomor WhatsApp dan Kata Sandi wajib diisi!", "error");
            return;
        }

        if (inputHp.startsWith('0')) {
            inputHp = '62' + inputHp.slice(1);
        }

        showLoading();

        // Bypass Khusus Pengurus/Admin[span_0](start_span)[span_0](end_span)
        if ((inputHp === "628" || inputHp === "admin") && inputPass === "admintuntas") {
            localStorage.setItem('tuntas_role', 'admin');
            localStorage.setItem('tuntas_nama_warga', 'PENGURUS RT 04');
            window.location.href = "adminz.html";
            return;
        }

        // Jalur Scan Node 'warga'
        const dbRef = ref(dbFirebase, 'warga');
        get(dbRef).then((snapshot) => {
            hideLoading();
            let userDitemukan = false;
            let dataUser = null;

            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const user = childSnapshot.val();
                    let dbHp = (user.hp || '').toString().trim();
                    
                    if (dbHp.startsWith('0')) dbHp = '62' + dbHp.slice(1);

                    if (dbHp === inputHp && user.password === inputPass) {
                        userDitemukan = true;
                        dataUser = user;
                        return true; 
                    }
                });

                if (userDitemukan) {
                    localStorage.setItem('tuntas_role', 'warga');
                    localStorage.setItem('tuntas_nama_warga', dataUser.nama.toUpperCase());
                    localStorage.setItem('tuntas_hp_warga', dataUser.hp);
                    window.location.href = "anggota.html";
                } else {
                    tuntasAlert("Akses Ditolak", "Nomor WhatsApp atau Kata Sandi salah.", "error");
                }
            } else {
                tuntasAlert("Akses Ditolak", "Data warga belum terdaftar di sistem.", "error");
            }
        }).catch((error) => {
            hideLoading();
            console.error(error);
            tuntasAlert("Error", "Gagal terhubung ke database.", "error");
        });
    }

    document.getElementById('btnMasukApp').addEventListener('click', prosesAutentikasiLogin);
    document.getElementById('btnTogglePass').addEventListener('click', window.togglePasswordLogin);
    document.getElementById('btnAlertClose').addEventListener('click', window.closeAlert);

    // =========================================================================
    // SKRIP AUTO-LOGIN DIHAPUS BIAR TIDAK TERJADI KEDIP / LOOP REDIRECT LAGI
    // =========================================================================
</script>
</body>
</html>
