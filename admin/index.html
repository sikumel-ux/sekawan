<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuntas. - Dashboard Admin</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading" class="fixed inset-0 bg-white/80 z-50 flex items-center justify-center font-bold text-emerald-900 hidden">
        Memproses Data...
    </div>

    <div class="max-w-md mx-auto p-5 space-y-6">
        
        <header class="flex justify-between items-center bg-white p-4 rounded-3xl border border-slate-100 shadow-sm">
            <div class="flex items-center gap-3">
                <img id="adminAvatar" src="" onerror="this.src='https://ui-avatars.com/api/?name=Admin&background=064E3B&color=fff'" class="w-10 h-10 rounded-full object-cover border">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Panel Pengurus,</p>
                    <h2 id="adminNama" class="text-sm font-black text-slate-800 uppercase tracking-tight">Memuat Admin...</h2>
                </div>
            </div>
            <button id="btnLogout" class="w-8 h-8 rounded-xl bg-red-50 text-red-600 flex items-center justify-center active:scale-90 transition-transform">
                <span class="material-symbols-rounded text-sm">logout</span>
            </button>
        </header>

        <div id="screen-sampah" class="tab-content active space-y-4">
            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <h3 class="text-xs font-black text-slate-700 uppercase tracking-tight">Absensi Pengambilan Sampah</h3>
                <p id="txtTglSampah" class="text-[9px] text-slate-400 font-bold mt-0.5">Hari ini</p>
            </div>

            <div class="space-y-3">
                <h4 class="font-black text-xs text-slate-400 uppercase tracking-tight px-1">Daftar Rumah Warga</h4>
                <div id="listAbsenSampah" class="space-y-2">
                    </div>
            </div>
        </div>

        <div id="screen-keuangan" class="tab-content space-y-5">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-4">
                <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider border-b pb-2">Catat Iuran & Cetak Kuitansi</h3>
                
                <div class="space-y-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Pilih Warga</label>
                        <select id="selectWargaIuran" class="modern-in mt-1">
                            <option value="">-- Pilih Anggota --</option>
                        </select>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Untuk Bulan</label>
                        <input type="text" id="inputBulanIuran" class="modern-in mt-1" placeholder="Contoh: Juni 2026">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Nominal (Rp)</label>
                        <input type="number" id="inputNominalIuran" class="modern-in mt-1" placeholder="Contoh: 20000" value="20000">
                    </div>

                    <button id="btnSimpanIuran" class="w-full bg-emerald-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-wider shadow-md active:scale-95 transition-transform">
                        Simpan & Buka Kuitansi
                    </button>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-[2rem] text-white space-y-4">
                <h3 class="text-xs font-black uppercase tracking-wider border-b border-white/10 pb-2">Arus Kas RT (Google Sheets)</h3>
                <div class="space-y-3">
                    <div>
                        <label class="text-[10px] font-bold opacity-60 uppercase px-1">Jenis Transaksi</label>
                        <select id="selectKategoriKas" class="modern-in bg-slate-800 text-white border-slate-700 mt-1">
                            <option value="Masuk">Pemasukan Lainnya (+)</option>
                            <option value="Keluar">Pengeluaran RT (-)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold opacity-60 uppercase px-1">Keterangan Keperluan</label>
                        <input type="text" id="inputKetKas" class="modern-in bg-slate-800 text-white border-slate-700 mt-1" placeholder="Contoh: Beli sapu & plastik sampah">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold opacity-60 uppercase px-1">Nominal (Rp)</label>
                        <input type="number" id="inputNominalKas" class="modern-in bg-slate-800 text-white border-slate-700 mt-1" placeholder="Contoh: 50000">
                    </div>
                    <button id="btnSimpanKasGeneral" class="w-full bg-white text-slate-900 py-3.5 rounded-2xl font-black uppercase text-xs tracking-wider shadow-md active:scale-95 transition-transform">
                        Catat di Buku Besar Sheets
                    </button>
                </div>
            </div>
        </div>

        <div id="screen-warga" class="tab-content space-y-5">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm space-y-4">
                <h3 class="text-xs font-black text-slate-700 uppercase tracking-wider">Tambah Anggota/Warga Baru</h3>
                <div class="space-y-3">
                    <input type="text" id="addNamaWarga" class="modern-in" placeholder="Nama Lengkap Warga">
                    <input type="number" id="addHpWarga" class="modern-in" placeholder="Nomor WhatsApp (Contoh: 628xxx)">
                    <p class="text-[9px] text-slate-400 font-bold px-1">*Password bawaan akun otomatis disamakan dengan nomor WA warga.</p>
                    <button id="btnTambahWarga" class="w-full bg-emerald-900 text-white py-3.5 rounded-xl text-xs font-black uppercase tracking-wider shadow-md">
                        Daftarkan Warga
                    </button>
                </div>
            </div>

            <div class="space-y-3">
                <h3 class="font-black text-xs text-slate-400 uppercase tracking-tight px-1">Warga Terdaftar</h3>
                <div id="listWargaMaster" class="space-y-2">
                    </div>
            </div>
        </div>

    </div>

    <nav class="fixed bottom-0 inset-x-0 h-16 bg-white border-t flex justify-around items-center px-6 z-50">
        <button id="nav-sampah" class="active flex flex-col items-center gap-1">
            <span class="material-symbols-rounded">delete_sweep</span>
            <span class="text-[8px] font-black uppercase">Log Sampah</span>
        </button>
        <button id="nav-keuangan" class="flex flex-col items-center gap-1">
            <span class="material-symbols-rounded">payments</span>
            <span class="text-[8px] font-black uppercase">Input Kas</span>
        </button>
        <button id="nav-warga" class="flex flex-col items-center gap-1">
            <span class="material-symbols-rounded">group</span>
            <span class="text-[8px] font-black uppercase">Data Warga</span>
        </button>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
