<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#064E3B">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Admin (Sheets)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-bottom: 110px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #F1F5F9; min-width: 120px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(4px); }
        .modal-content { background:white; padding:24px; border-radius:2rem; width:100%; max-width:400px; }
        nav button.active { color: #064E3B; transform: translateY(-5px); }
        nav button { color: #94A3B8; transition: all 0.3s; }
        .modern-in { width:100%; padding:14px; background:#F1F5F9; border:1px solid #E2E8F0; border-radius:1rem; outline:none; font-size: 13px; font-weight: 600; color: #1E293B; }
        .table-scroll { overflow-x: auto; border-radius: 1.5rem; border: 1px solid #E2E8F0; background: white; }
        ::-webkit-scrollbar { display: none; }
        .loading-overlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.7); z-index:200; align-items:center; justify-content:center; font-weight:bold; color:#064E3B; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">Memproses ke Sheets...</div>

<div id="mainApp" class="max-w-md mx-auto p-5">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-white"><span class="material-symbols-rounded">wallet</span></div>
            <h1 class="text-xl font-black text-emerald-900">Tuntas.</h1>
        </div>
    </header>

    <div id="screen-home" class="tab-content active space-y-4">
        <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm space-y-3">
            <div class="flex justify-between items-center px-1">
                <p class="text-[10px] font-black text-slate-400 uppercase">Filter Laporan</p>
                <button onclick="downloadPDF()" class="flex items-center gap-1 text-emerald-700 font-black text-[9px] uppercase bg-emerald-50 px-3 py-1.5 rounded-lg border border-emerald-100">
                    <span class="material-symbols-rounded !text-sm">download</span> PDF
                </button>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[8px] font-bold text-slate-400 ml-2 uppercase">Dari</label>
                    <input type="date" id="fMulai" onchange="renderDataTabel()" class="modern-in !py-2 !text-[11px]">
                </div>
                <div>
                    <label class="text-[8px] font-bold text-slate-400 ml-2 uppercase">Sampai</label>
                    <input type="date" id="fSelesai" onchange="renderDataTabel()" class="modern-in !py-2 !text-[11px]">
                </div>
            </div>
        </div>

        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Saldo Periode (Filter)</p>
            <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
            <div class="mt-4 pt-4 border-t border-white/10 flex justify-between">
                 <p class="text-[9px] font-bold opacity-50 uppercase">Total Saldo Bersih:</p>
                 <p id="saldoSelamanya" class="text-[10px] font-black">Rp 0</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm text-center">
                <p class="text-[9px] font-bold text-emerald-500 uppercase">Masuk (Filter)</p>
                <p id="totalMasuk" class="text-lg font-black text-slate-800">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm text-center">
                <p class="text-[9px] font-bold text-red-500 uppercase">Keluar (Filter)</p>
                <p id="totalKeluar" class="text-lg font-black text-slate-800">Rp 0</p>
            </div>
        </div>

        <button onclick="openModal('mKas')" class="w-full bg-white border-2 border-emerald-900 text-emerald-900 p-4 rounded-3xl font-black text-xs uppercase shadow-sm active:bg-slate-50">Catat Kas Umum</button>
        
        <div class="pt-4">
            <h3 class="font-black text-xs text-slate-400 uppercase tracking-tighter mb-3">Histori Transaksi Terfilter</h3>
            <div id="listRiwayat" class="space-y-2"></div>
        </div>
    </div>

    <div id="screen-warga" class="tab-content space-y-4">
        <div class="flex justify-between items-end px-1">
            <h3 class="font-black text-emerald-900 uppercase text-lg">Daftar Warga</h3>
            <button onclick="openModal('mAnggota')" class="bg-emerald-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">+ Warga</button>
        </div>
        <div id="tBodyWarga" class="space-y-2"></div>
    </div>

    <div id="screen-rekap" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase text-lg px-1">Rekap Iuran</h3>
        <div class="table-scroll">
            <table class="w-full text-left text-[11px]">
                <thead><tr id="th-rekap" class="text-slate-400 uppercase font-black"></tr></thead>
                <tbody id="tb-rekap"></tbody>
                <tfoot id="tf-rekap" class="bg-emerald-50 font-black text-emerald-900"></tfoot>
            </table>
        </div>
    </div>

    <div id="screen-bayar" class="tab-content space-y-4">
        <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4">
            <h3 class="font-black text-emerald-900 uppercase text-center tracking-widest">Input Pembayaran</h3>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Tanggal Bayar</label>
                <input type="date" id="iTgl" class="modern-in">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Nama Warga</label>
                <select id="iNama" class="modern-in font-bold uppercase"></select>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Pilih Bulan</label>
                <div id="gridBulan" class="grid grid-cols-3 gap-2"></div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1">Nominal Rp</label>
                <input type="number" id="iNom" class="modern-in font-black text-2xl text-emerald-700 text-center" placeholder="0">
            </div>
            <button onclick="simpanIuran()" class="w-full bg-emerald-900 text-white p-5 rounded-2xl font-black shadow-lg uppercase text-xs active:scale-95 transition-transform">Simpan & Kirim WA</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-4 z-50">
        <button onclick="st('home')" id="n-home" class="active flex flex-col items-center gap-1"><span class="material-symbols-rounded">dashboard</span><span class="text-[9px] font-bold">HOME</span></button>
        <button onclick="st('warga')" id="n-warga" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">group</span><span class="text-[9px] font-bold">WARGA</span></button>
        <button onclick="st('rekap')" id="n-rekap" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">analytics</span><span class="text-[9px] font-bold">REKAP</span></button>
        <button onclick="st('bayar')" id="n-bayar" class="flex flex-col items-center gap-1"><span class="material-symbols-rounded">payments</span><span class="text-[9px] font-bold">BAYAR</span></button>
    </nav>
</div>

<div id="mKas" class="modal" onclick="if(event.target==this)closeModal('mKas')">
    <div class="modal-content space-y-4">
        <h3 class="font-black text-center uppercase text-emerald-900">Catat Kas Umum</h3>
        <input type="date" id="kTgl" class="modern-in">
        <select id="kKat" class="modern-in">
            <option value="Masuk">Pemasukan (+)</option>
            <option value="Keluar">Pengeluaran (-)</option>
        </select>
        <input type="text" id="kKet" class="modern-in" placeholder="Keterangan">
        <input type="number" id="kNom" class="modern-in font-black text-center text-xl" placeholder="Nominal Rp">
        <button onclick="simpanKas()" class="w-full bg-emerald-900 text-white p-4 rounded-2xl font-black uppercase shadow-lg">Simpan</button>
    </div>
</div>

<div id="mAnggota" class="modal" onclick="if(event.target==this)closeModal('mAnggota')">
    <div class="modal-content space-y-4">
        <h3 class="font-black text-center uppercase text-emerald-900">Tambah Warga</h3>
        <input type="text" id="aNama" class="modern-in uppercase" placeholder="Nama Lengkap">
        <input type="number" id="aHp" class="modern-in" placeholder="Contoh: 62812345">
        <button onclick="simpanAnggota()" class="w-full bg-emerald-900 text-white p-4 rounded-2xl font-black uppercase shadow-lg">Simpan Data</button>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP HASIL DEPLOY APPS SCRIPT KAMU DI SINI
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrlsCnA3JJVgAfn5ZlZTfUOSp3ykWvJ40oxx0G0qKLqEzqFOM1S4A9FNUakBcZhypl/exec";

    const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    
    let dbGlobal = { gas: [], pembayaran: [], anggota: [] };
    let cacheAllTrx = []; 
    let dataWarga = {};

    function showLoading() { document.getElementById('loading').style.display = 'flex'; }
    function hideLoading() { document.getElementById('loading').style.display = 'none'; }

    function init() {
        const now = new Date();
        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('fMulai').value = startOfMonth;
        document.getElementById('fSelesai').value = now.toISOString().split('T')[0];
        document.getElementById('iTgl').value = now.toISOString().split('T')[0];
        document.getElementById('kTgl').value = now.toISOString().split('T')[0];
        
        const grid = document.getElementById('gridBulan');
        const thr = document.getElementById('th-rekap');
        grid.innerHTML = ''; 
        thr.innerHTML = '<th class="sticky-col p-4 bg-white">Nama</th>';
        
        daftarBulan.forEach(bln => {
            grid.innerHTML += `<label class="relative block"><input type="checkbox" name="blnCek" value="${bln}" class="hidden peer"><div class="cursor-pointer text-[9px] font-black py-3 text-center border rounded-xl bg-white text-slate-300 peer-checked:bg-emerald-900 peer-checked:text-white uppercase transition-all">${bln.substring(0,3)}</div></label>`;
            thr.innerHTML += `<th class="text-center p-3 font-bold text-slate-400">${bln.substring(0,3)}</th>`;
        });
        thr.innerHTML += '<th class="text-center p-3 font-bold text-slate-400">AKSI</th>';
        
        loadDataDariSheets();
    }

    async function loadDataDariSheets() {
        showLoading();
        try {
            let res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "loadAll" })
            });
            let json = await res.json();
            if(json.status === "success") {
                dbGlobal = json.data;
                renderDataTabel();
            } else { alert("Gagal memuat data dari Sheets!"); }
        } catch(e) { console.error(e); alert("Koneksi Error!"); }
        hideLoading();
    }

    function renderDataTabel() {
        const fMulai = new Date(document.getElementById('fMulai').value);
        const fSelesai = new Date(document.getElementById('fSelesai').value);
        fSelesai.setHours(23,59,59);

        let tInFilter = 0, tOutFilter = 0;
        let tInTotal = 0, tOutTotal = 0;
        let trxFilter = [];
        let totalsBln = {}; daftarBulan.forEach(b => totalsBln[b] = 0);

        const listR = document.getElementById('listRiwayat');
        const ti = document.getElementById('tBodyWarga'), tr = document.getElementById('tb-rekap'), sel = document.getElementById('iNama');
        
        listR.innerHTML = ''; ti.innerHTML = ''; tr.innerHTML = ''; 
        sel.innerHTML = '<option value="">PILIH WARGA</option>';

        let allSource = [];
        
        dbGlobal.gas.forEach(d => {
            allSource.push({ col: 'gas', tgl: new Date(d.tgl), ket: d.ket, nom: Number(d.nom), kat: d.kat });
        });
        
        dbGlobal.pembayaran.forEach(d => {
            // Membaca string keterangan terstruktur: "Iuran: NAMA [Bulan] (Tgl)"
            let itemKet = d.ket || "";
            let namaWarga = "";
            let bulanBanyak = "";
            let tglEstimasi = new Date();
            
            if (itemKet.startsWith("Iuran: ")) {
                let s1 = itemKet.replace("Iuran: ", "").split(" [");
                namaWarga = s1[0].trim();
                if (s1[1]) {
                    let s2 = s1[1].split("] (");
                    bulanBanyak = s2[0];
                    if (s2[1]) {
                        tglEstimasi = new Date(s2[1].replace(")", ""));
                    }
                }
            }
            
            allSource.push({ col: 'pembayaran', tgl: tglEstimasi, ket: itemKet, nom: Number(d.nom), kat: 'Masuk', parserNama: namaWarga, parserBulan: bulanBanyak });
        });

        allSource.forEach(tx => {
            if(tx.kat === 'Masuk') tInTotal += tx.nom; else tOutTotal += tx.nom;
            if(tx.tgl >= fMulai && tx.tgl <= fSelesai) {
                trxFilter.push(tx);
                if(tx.kat === 'Masuk') tInFilter += tx.nom; else tOutFilter += tx.nom;
            }
        });

        cacheAllTrx = trxFilter.sort((a,b) => b.tgl - a.tgl);
        let saldoKeseluruhanGlobal = tInTotal - tOutTotal;

        document.getElementById('totalSaldo').innerText = 'Rp ' + (tInFilter - tOutFilter).toLocaleString('id-ID');
        document.getElementById('saldoSelamanya').innerText = 'Rp ' + saldoKeseluruhanGlobal.toLocaleString('id-ID');
        document.getElementById('totalMasuk').innerText = 'Rp ' + tInFilter.toLocaleString('id-ID');
        document.getElementById('totalKeluar').innerText = 'Rp ' + tOutFilter.toLocaleString('id-ID');

        cacheAllTrx.forEach(tx => {
            const isM = tx.kat === 'Masuk';
            let paramHapus = tx.col == 'gas' ? `'gas', '${tx.ket}|${tx.nom}'` : `'pembayaran', '${tx.ket}|${tx.nom}'`;
            listR.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm"><div class="flex gap-3 items-center"><div class="w-8 h-8 rounded-lg ${isM?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'} flex items-center justify-center font-black text-[9px]">${isM?'IN':'OUT'}</div><div><p class="text-xs font-black uppercase text-slate-700 tracking-tighter">${tx.ket}</p><p class="text-[8px] text-slate-300 font-bold">${tx.tgl.toLocaleDateString('id-ID')}</p></div></div><div class="text-right flex items-center gap-2"><p class="font-black text-xs ${isM?'text-emerald-700':'text-red-600'}">${isM?'+':'-'} ${tx.nom.toLocaleString()}</p><button onclick="hapusTrx(${paramHapus})" class="text-slate-200"><span class="material-symbols-rounded text-sm">delete</span></button></div></div>`);
        });

        dbGlobal.anggota.forEach(d => {
            const n = d.nama.trim().toUpperCase();
            dataWarga[n] = d.hp || '';
            sel.insertAdjacentHTML('beforeend', `<option value="${n}">${n}</option>`);
            ti.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm"><div><p class="font-black text-xs uppercase text-slate-700">${n}</p><p class="text-[9px] text-slate-400 font-bold">${d.hp || '-'}</p></div><button onclick="hapusTrx('anggota','${n}')" class="text-red-100"><span class="material-symbols-rounded">delete</span></button></div>`);

            let row = `<tr><td class="sticky-col p-4 font-bold text-slate-700 bg-white border-b border-slate-50 uppercase">${n}</td>`;
            daftarBulan.forEach(bln => {
                const lunas = allSource.filter(k => k.col === 'pembayaran' && k.parserNama === n && k.parserBulan.includes(bln));
                if(lunas.length > 0) {
                    let nomBln = 0; lunas.forEach(l => nomBln += (Number(l.nom) / l.parserBulan.split(',').length));
                    row += `<td class="text-center text-emerald-600 font-black">${(nomBln/1000).toFixed(0)}K</td>`;
                    totalsBln[bln] += nomBln;
                } else { row += `<td class="text-center text-slate-100">-</td>`; }
            });
            row += `<td class="text-center p-4"><button onclick="hapusIuranWarga('${n}')" class="text-red-300"><span class="material-symbols-rounded text-sm">delete_sweep</span></button></td>`;
            tr.insertAdjacentHTML('beforeend', row + `</tr>`);
        });

        let frow = `<tr><td class="sticky-col p-4 font-black bg-emerald-50 text-emerald-900 uppercase">TOTAL</td>`;
        daftarBulan.forEach(bln => frow += `<td class="text-center p-4 bg-emerald-50 text-emerald-800 font-black">${(totalsBln[bln]/1000).toFixed(0)}K</td>`);
        document.getElementById('tf-rekap').innerHTML = frow + `<td class="bg-emerald-50"></td></tr>`;
    }

    async function kirimKeSheets(payload) {
        showLoading();
        try {
            let res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            let json = await res.json();
            if(json.status === "success") {
                await loadDataDariSheets();
            } else { alert("Gagal memproses ke Sheets!"); hideLoading(); }
        } catch(e) { console.error(e); alert("Error Jaringan!"); hideLoading(); }
    }

    async function simpanIuran() {
        const n = document.getElementById('iNama').value, nmn = Number(document.getElementById('iNom').value), tglVal = document.getElementById('iTgl').value;
        const blns = Array.from(document.querySelectorAll('input[name="blnCek"]:checked')).map(c => c.value);
        if(!n || !nmn || blns.length === 0 || !tglVal) return alert("Lengkapi data!");
        const kode = "T-" + Math.floor(100000 + Math.random() * 900000); 
        
        // Menggabungkan detail informasi agar masuk ke kolom tunggal 'Keterangan' di sheet pembayaran
        const txtKeterangan = `Iuran: ${n} [${blns.join(",")}] (${tglVal})`;
        
        await kirimKeSheets({ action: "simpanIuran", ket: txtKeterangan, nom: nmn });
        
        const msg = `Halo, pak/bu *${n}*..%0APembayaran iuran telah kami terima dengan no referensi *${kode}*.%0A%0ATerimakasih atas partisipasinya.%0A%0APengurus TUNTAS.`;
        window.open(`https://wa.me/${(dataWarga[n]||'').toString().replace(/^0/,'62')}?text=${msg}`);
        document.getElementById('iNom').value = '';
        document.querySelectorAll('input[name="blnCek"]').forEach(c => c.checked = false);
    }

    async function simpanKas() {
        const tgl = document.getElementById('kTgl').value, kat = document.getElementById('kKat').value, ket = document.getElementById('kKet').value, nom = Number(document.getElementById('kNom').value);
        if(!ket || !nom || !tgl) return alert("Lengkapi data!");
        
        await kirimKeSheets({ action: "simpanKas", tgl, kat, ket, nom });
        document.getElementById('kKet').value = ''; document.getElementById('kNom').value = '';
        closeModal('mKas');
    }

    async function simpanAnggota() {
        const n = document.getElementById('aNama').value.trim().toUpperCase(), h = document.getElementById('aHp').value;
        if(n) { 
            await kirimKeSheets({ action: "simpanAnggota", nama: n, hp: h }); 
            closeModal('mAnggota'); 
        }
    }

    async function hapusTrx(col, id) { 
        if(confirm("Hapus data ini secara permanen?")) { 
            let payload = { action: "hapusTrx", col: col, id: id };
            if (col == 'gas' || col == 'pembayaran') {
                let splitData = id.split('|');
                payload.ket = splitData[0];
                payload.nom = Number(splitData[1]);
            }
            await kirimKeSheets(payload);
        } 
    }

    async function hapusIuranWarga(namaWarga) {
        if (confirm(`Hapus semua riwayat pembayaran atas nama ${namaWarga}?`)) {
            await kirimKeSheets({ action: "hapusIuranWarga", namaWarga: namaWarga });
        }
    }

    function st(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('screen-'+t).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('n-'+t).classList.add('active');
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const tglAwal = document.getElementById('fMulai').value;
        const tglAkhir = document.getElementById('fSelesai').value;
        doc.setFontSize(22); doc.setTextColor(6, 78, 59); doc.setFont("helvetica", "bold");
        doc.text("TUNTAS.", 14, 20);
        doc.setFontSize(10); doc.setTextColor(100); doc.text(`Laporan Kas: ${tglAwal} s/d ${tglAkhir}`, 14, 28);
        doc.autoTable({
            startY: 40,
            head: [['Tanggal', 'Keterangan', 'Tipe', 'Nominal']],
            body: cacheAllTrx.map(t => [t.tgl.toLocaleDateString('id-ID'), t.ket.toUpperCase(), t.kat.toUpperCase(), t.nom.toLocaleString()]),
            headStyles: { fillColor: [6, 78, 59] }
        });
        doc.save(`Laporan_Kas_Tuntas.pdf`);
    }

    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    
    window.onload = init;
</script>
</body>
</html>
