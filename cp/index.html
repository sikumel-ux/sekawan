<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS Kas - App View</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TOP BAR (Fixed App Header) -->
    <header class="app-bar">
        <div class="logo">
            <i class="fa-solid fa-leaf"></i>
            <h1>TUNTAS <span class="brand-sub">Kas</span></h1>
        </div>
        <div class="user-profile">
            <i class="fa-solid fa-circle-user"></i>
            <span id="user-name">Bendahara</span>
        </div>
    </header>

    <div class="app-container">
        
        <!-- DASHBOARD SUMMARY (Compact Grid) -->
        <section class="summary-grid">
            <div class="card balance">
                <p>Sisa Saldo</p>
                <h3 id="total-saldo">Rp 0</h3>
            </div>
            <div class="card income">
                <p><i class="fa-solid fa-arrow-down-long"></i> Pemasukan</p>
                <h3 id="total-pemasukan">Rp 0</h3>
            </div>
            <div class="card expense">
                <p><i class="fa-solid fa-arrow-up-long"></i> Pengeluaran</p>
                <h3 id="total-pengeluaran">Rp 0</h3>
            </div>
        </section>

        <!-- DROPDOWN FORM INPUT (Collapsible Form ala Apps) -->
        <section class="form-collapsible">
            <button type="button" class="form-toggle-btn" id="btn-toggle-form">
                <span><i class="fa-solid fa-circle-plus"></i> Tambah Transaksi Baru</span>
                <i class="fa-solid fa-chevron-down toggle-icon" id="icon-toggle"></i>
            </button>
            
            <div class="form-content" id="form-container">
                <form id="form-kas">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="tanggal">Tanggal</label>
                            <input type="date" id="tanggal" required>
                        </div>
                        <div class="form-group">
                            <label for="jenis">Jenis</label>
                            <select id="jenis" required>
                                <option value="" disabled selected>Pilih...</option>
                                <option value="Pemasukan">Pemasukan</option>
                                <option value="Pengeluaran">Pengeluaran</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="kategori">Kategori</label>
                        <select id="kategori" required>
                            <option value="" disabled selected>Pilih kategori...</option>
                            <option value="Iuran Warga">Iuran Warga</option>
                            <option value="Penjualan Sampah">Penjualan Sampah Anorganik</option>
                            <option value="Operasional">Operasional Angkut</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="nominal">Nominal Transaksi (Rp)</label>
                        <input type="number" id="nominal" placeholder="Masukan angka..." inputmode="numeric" required>
                    </div>

                    <div class="form-group">
                        <label for="keterangan">Keterangan / Catatan</label>
                        <textarea id="keterangan" rows="2" placeholder="Tulis detail transaksi..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-check"></i> Simpan Transaksi
                    </button>
                </form>
            </div>
        </section>

        <!-- HISTORY SECTION (List View, Bukan Tabel) -->
        <main class="history-section">
            <div class="section-title">
                <h2>Riwayat Transaksi</h2>
            </div>
            
            <!-- Tempat data transaksi disuntikkan secara dinamis -->
            <div class="transaction-list" id="list-transaksi-mobile"></div>
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
