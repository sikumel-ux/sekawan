<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS Kas - Go Green</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i>
                <h1>TUNTAS <span class="brand-sub">Kas</span></h1>
            </div>
            <div class="user-profile">
                <i class="fa-solid fa-circle-user"></i>
                <span id="user-name">Bendahara</span>
            </div>
        </header>

        <!-- DASHBOARD SUMMARY (Bentuk Slider/Scroll Horizontal di Mobile) -->
        <section class="summary-cards">
            <div class="card balance">
                <div class="card-icon"><i class="fa-solid fa-wallet"></i></div>
                <div class="card-info">
                    <p>Sisa Saldo</p>
                    <h3 id="total-saldo">Rp 0</h3>
                </div>
            </div>
            <div class="card income">
                <div class="card-icon"><i class="fa-solid fa-arrow-down"></i></div>
                <div class="card-info">
                    <p>Total Pemasukan</p>
                    <h3 id="total-pemasukan">Rp 0</h3>
                </div>
            </div>
            <div class="card expense">
                <div class="card-icon"><i class="fa-solid fa-arrow-up"></i></div>
                <div class="card-info">
                    <p>Total Pengeluaran</p>
                    <h3 id="total-pengeluaran">Rp 0</h3>
                </div>
            </div>
        </section>

        <!-- MAIN LAYOUT (Mobile-First: Form di atas, Tabel di bawah) -->
        <div class="main-layout">
            
            <!-- FORM INPUT KAS (Card Style) -->
            <aside class="form-section dynamic-card">
                <h2><i class="fa-solid fa-square-plus"></i> Input Transaksi</h2>
                <form id="form-kas">
                    <div class="form-group">
                        <label for="tanggal">Tanggal</label>
                        <input type="date" id="tanggal" required>
                    </div>

                    <div class="form-group">
                        <label for="jenis">Jenis Transaksi</label>
                        <select id="jenis" required>
                            <option value="" disabled selected>Pilih jenis...</option>
                            <option value="Pemasukan">Pemasukan</option>
                            <option value="Pengeluaran">Pengeluaran</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="kategori">Kategori</label>
                        <select id="kategori" required>
                            <option value="" disabled selected>Pilih kategori...</option>
                            <option value="Iuran Warga">Iuran Warga</option>
                            <option value="Penjualan Sampah">Penjualan Sampah Anorganik</option>
                            <option value="Operasional">Operasional Angkut</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="nominal">Nominal (Rp)</label>
                        <input type="number" id="nominal" placeholder="Contoh: 50000" inputmode="numeric" required>
                    </div>

                    <div class="form-group">
                        <label for="keterangan">Keterangan</label>
                        <textarea id="keterangan" rows="2" placeholder="Detail transaksi..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">
                        <i class="fa-solid fa-paper-plane"></i> Simpan ke Kas
                    </button>
                </form>
            </aside>

            <!-- TABEL RIWAYAT KAS (Card Style) -->
            <main class="table-section dynamic-card">
                <div class="table-header">
                    <h2><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Kas</h2>
                </div>
                <div class="table-responsive">
                    <table id="tabel-kas">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Jenis</th>
                                <th>Kategori</th>
                                <th>Keterangan</th>
                                <th>Nominal</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="list-transaksi">
                            <!-- Data dinamis dari js -->
                        </tbody>
                    </table>
                </div>
            </main>

        </div>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
