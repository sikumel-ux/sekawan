<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #f5f7fb;
      font-family: 'Inter', sans-serif;
      color: #111827;
    }

    .premium-card {
      background: white;
      border-radius: 28px;
      box-shadow:
        0 10px 30px rgba(15,23,42,0.06),
        0 2px 10px rgba(15,23,42,0.04);
    }

    .gradient-header {
      background: linear-gradient(135deg,#0085ff 0%,#0066ff 55%,#0047cc 100%);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(14px);
      border-top: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 -10px 30px rgba(15,23,42,0.08);
      z-index: 998;
    }

    .fab {
      position: fixed;
      bottom: 95px;
      right: 22px;
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: linear-gradient(135deg,#0085ff,#005eff);
      color: white;
      font-size: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 15px 30px rgba(0,102,255,0.35);
      z-index: 999;
    }
  </style>
</head>

<body>

<div class="max-w-md mx-auto min-h-screen pb-32">

  <div class="gradient-header rounded-b-[40px] p-6 text-white shadow-xl relative overflow-hidden">

    <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full"></div>
    <div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full"></div>

    <div class="flex justify-between items-center">
      <div>
        <p class="text-blue-100 text-sm">Selamat Datang</p>
        <h1 class="text-3xl font-bold mt-1">Kas Digital</h1>
      </div>

      <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center text-xl">
        💰
      </div>
    </div>

    <div class="mt-6 premium-card p-5 text-black">
      <p class="text-gray-500 text-sm">Total Saldo</p>
      <h2 id="saldo" class="text-3xl font-bold mt-2 text-blue-600">Rp0</h2>

      <div class="grid grid-cols-2 gap-3 mt-5">

        <div class="bg-green-50 rounded-2xl p-3">
          <p class="text-xs text-green-700">Kas Masuk</p>
          <h3 id="masuk" class="font-bold text-green-600 mt-1">Rp0</h3>
        </div>

        <div class="bg-red-50 rounded-2xl p-3">
          <p class="text-xs text-red-700">Kas Keluar</p>
          <h3 id="keluar" class="font-bold text-red-600 mt-1">Rp0</h3>
        </div>

      </div>
    </div>

  </div>

  <div class="p-4 space-y-5 -mt-6">

    <div class="grid grid-cols-4 gap-3">

      <div class="premium-card p-4 text-center">
        <div class="text-2xl">💸</div>
        <p class="text-xs text-gray-500 mt-2">Pemasukan</p>
      </div>

      <div class="premium-card p-4 text-center">
        <div class="text-2xl">📊</div>
        <p class="text-xs text-gray-500 mt-2">Pengeluaran</p>
      </div>

      <div class="premium-card p-4 text-center">
        <div class="text-2xl">💰</div>
        <p class="text-xs text-gray-500 mt-2">Laporan</p>
      </div>

    </div>

    <div class="premium-card p-4">
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-bold text-lg">Cashflow</h2>
        <span class="text-xs bg-blue-100 text-blue-600 px-3 py-1 rounded-full">
          Bulan Ini
        </span>
      </div>

      <canvas id="chart"></canvas>
    </div>

    <div class="premium-card p-4 space-y-4">

      <div class="flex justify-between items-center">
        <h2 class="font-bold text-lg">Tambah Transaksi</h2>
        <span class="text-xs text-gray-400">Input Cepat</span>
      </div>

      <input id="tanggal" type="date"
        class="w-full bg-gray-100 rounded-2xl p-4 outline-none">

      <select id="jenis"
        class="w-full bg-gray-100 rounded-2xl p-4 outline-none">
        <option>Masuk</option>
        <option>Keluar</option>
      </select>

      <input id="kategori"
        placeholder="Kategori"
        class="w-full bg-gray-100 rounded-2xl p-4 outline-none">

      <input id="keterangan"
        placeholder="Keterangan"
        class="w-full bg-gray-100 rounded-2xl p-4 outline-none">

      <input id="nominal"
        type="number"
        placeholder="Nominal"
        class="w-full bg-gray-100 rounded-2xl p-4 outline-none">

      <button onclick="simpan()"
        class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 text-white p-4 rounded-3xl font-bold shadow-xl">
        Simpan Transaksi
      </button>

    </div>

    <div>

      <div class="premium-card p-3 mb-4 flex items-center gap-3">
        <input
          type="text"
          placeholder="Cari transaksi..."
          class="flex-1 bg-transparent outline-none text-sm">

        <button class="bg-blue-100 text-blue-600 px-4 py-2 rounded-xl text-sm">
          Filter
        </button>
      </div>

      <div class="flex justify-between items-center mb-4">
        <h2 class="font-bold text-lg">Riwayat Transaksi</h2>
        <span class="text-xs text-gray-500">Terbaru</span>
      </div>

      <div class="space-y-3" id="listTransaksi"></div>
    </div>

  </div>

  <button class="fab">+</button>

  <div class="bottom-nav">

    <div class="max-w-md mx-auto grid grid-cols-4 text-center py-3">

      <div class="nav-item text-blue-600">
        <div class="w-10 h-10 mx-auto rounded-2xl bg-blue-100 flex items-center justify-center">🏠</div>
        <div class="text-xl">🏠</div>
        <p class="text-xs mt-1">Home</p>
      </div>

      <div class="nav-item text-gray-400">
        <div class="w-10 h-10 mx-auto rounded-2xl bg-gray-100 flex items-center justify-center">📊</div>
        <p class="text-xs mt-1">Laporan</p>
      </div>

      <div class="nav-item text-gray-400">
        <div class="w-10 h-10 mx-auto rounded-2xl bg-gray-100 flex items-center justify-center">💳</div>
        <p class="text-xs mt-1">Kas</p>
      </div>

      <div class="nav-item text-gray-400">
        <div class="w-10 h-10 mx-auto rounded-2xl bg-gray-100 flex items-center justify-center">⚙️</div>
        <p class="text-xs mt-1">Setting</p>
      </div>

    </div>

  </div>

</div>

<script>

let chart;

function rupiah(angka) {
  return new Intl.NumberFormat('id-ID', {
    style: 'currency',
    currency: 'IDR'
  }).format(angka);
}

function loadSummary() {

  google.script.run.withSuccessHandler(res => {

    document.getElementById('masuk').innerText = rupiah(res.masuk);
    document.getElementById('keluar').innerText = rupiah(res.keluar);
    document.getElementById('saldo').innerText = rupiah(res.saldo);

    renderChart(res.masuk, res.keluar);

  }).getSummary();
}

function renderChart(masuk, keluar) {

  const ctx = document.getElementById('chart');

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Kas Masuk', 'Kas Keluar'],
      datasets: [{
        data: [masuk, keluar],
        borderRadius: 12
      }]
    },
    options: {
      plugins: {
        legend: {
          position: 'bottom'
        }
      }
    }
  });
}

function loadTransaksi() {

  google.script.run.withSuccessHandler(data => {

    let html = '';

    data.forEach(row => {

      const warna = row[2] === 'Masuk'
        ? 'text-green-600 bg-green-50'
        : 'text-red-600 bg-red-50';

      const icon = row[2] === 'Masuk'
        ? '⬇️'
        : '⬆️';

      html += `

      <div class="premium-card p-4">

        <div class="flex justify-between items-center">

          <div class="flex items-center gap-3">

            <div class="w-12 h-12 rounded-2xl ${warna} flex items-center justify-center text-xl">
              ${icon}
            </div>

            <div>
              <h3 class="font-bold">${row[3]}</h3>
              <p class="text-sm text-gray-500">${row[4]}</p>
              <p class="text-xs text-gray-400 mt-1">${row[1]}</p>
            </div>

          </div>

          <div class="text-right">
            <h3 class="font-bold ${warna.includes('green') ? 'text-green-600' : 'text-red-600'}">
              ${rupiah(row[5])}
            </h3>

            <button
              onclick="hapus('${row[0]}')"
              class="text-xs text-gray-400 mt-2">
              Hapus
            </button>
          </div>

        </div>

      </div>

      `;

    });

    document.getElementById('listTransaksi').innerHTML = html;

  }).getTransaksi();
}

function simpan() {

  const data = {
    tanggal: document.getElementById('tanggal').value,
    jenis: document.getElementById('jenis').value,
    kategori: document.getElementById('kategori').value,
    keterangan: document.getElementById('keterangan').value,
    nominal: document.getElementById('nominal').value
  };

  google.script.run.withSuccessHandler(res => {

    alert(res.message);

    loadSummary();
    loadTransaksi();

    document.getElementById('kategori').value = '';
    document.getElementById('keterangan').value = '';
    document.getElementById('nominal').value = '';

  }).simpanTransaksi(data);
}

function hapus(id) {

  if (confirm('Hapus transaksi ini?')) {

    google.script.run.withSuccessHandler(() => {
      loadSummary();
      loadTransaksi();
    }).hapusTransaksi(id);

  }
}

loadSummary();
loadTransaksi();

</script>

</body>
</html>
