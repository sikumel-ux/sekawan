<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>
    Kas Sampah TUNTAS
  </title>

  <!-- POPPINS -->

  <link
  rel="preconnect"
  href="https://fonts.googleapis.com">

  <link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link
  href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">

  <!-- FONT AWESOME -->

  <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- CHART -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Poppins',sans-serif;
      background:#f4f7fb;
      color:#111827;

    }

    .app{

      max-width:480px;
      margin:auto;
      min-height:100vh;
      padding-bottom:120px;

    }

    /* PAGE */

    .page{
      display:none;
    }

    .active-page{
      display:block;
    }

    /* HEADER */

    .header{

      background:
      linear-gradient(
        135deg,
        #16a34a,
        #15803d,
        #166534
      );

      padding:24px;
      border-radius:0 0 40px 40px;
      color:white;

    }

    .header-top{

      display:flex;
      justify-content:space-between;
      align-items:center;

    }

    .sub{

      opacity:.8;
      font-size:14px;

    }

    .header h1{

      margin-top:8px;
      font-size:32px;
      font-weight:700;

    }

    .welcome{

      margin-top:8px;
      font-size:13px;
      opacity:.8;

    }

    /* SALDO */

    .saldo-card{

      background:white;
      border-radius:32px;
      padding:24px;
      margin-top:24px;
      color:#111827;

      box-shadow:
      0 10px 35px rgba(15,23,42,.08);

    }

    .saldo-label{

      color:#6b7280;
      font-size:14px;

    }

    .saldo-card h2{

      margin-top:10px;
      font-size:38px;
      color:#16a34a;
      font-weight:700;

    }

    .summary{

      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:20px;

    }

    .summary-item{

      border-radius:24px;
      padding:18px;

    }

    .summary-item span{

      font-size:13px;
      color:#6b7280;

    }

    .summary-item h3{

      margin-top:8px;
      font-size:20px;

    }

    .income{
      background:#dcfce7;
    }

    .expense{
      background:#fee2e2;
    }

    /* CARD */

    .card{

      background:white;
      border-radius:32px;
      padding:22px;
      margin:20px;

      box-shadow:
      0 8px 30px rgba(15,23,42,.06);

    }

    .section-title{

      margin-bottom:16px;
      font-size:18px;

    }

    /* FILTER */

    .filter-box{

      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;

    }

    input,
    select{

      width:100%;
      border:none;
      background:#f3f4f6;
      padding:16px;
      border-radius:18px;
      outline:none;
      margin-top:12px;

      font-family:'Poppins',sans-serif;

    }

    .filter-btn,
    .save-btn{

      width:100%;
      border:none;
      margin-top:14px;
      padding:16px;
      border-radius:22px;

      background:
      linear-gradient(
        135deg,
        #16a34a,
        #15803d
      );

      color:white;
      font-weight:600;
      font-size:15px;

      font-family:'Poppins',sans-serif;

    }

    /* TRANSAKSI */

    .transaksi-list{

      padding:0 20px;
      display:flex;
      flex-direction:column;
      gap:16px;

    }

    .transaksi-item{

      background:white;
      border-radius:28px;
      padding:18px;

      display:flex;
      justify-content:space-between;
      align-items:center;

      box-shadow:
      0 8px 30px rgba(15,23,42,.06);

    }

    .transaksi-left{

      display:flex;
      gap:14px;
      align-items:center;

    }

    .icon{

      width:56px;
      height:56px;

      border-radius:20px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:20px;

    }

    .icon.in{

      background:#dcfce7;
      color:#16a34a;

    }

    .icon.out{

      background:#fee2e2;
      color:#dc2626;

    }

    .transaksi-info h3{

      font-size:16px;
      font-weight:600;

    }

    .transaksi-info p{

      margin-top:4px;
      color:#6b7280;
      font-size:13px;

    }

    .transaksi-info small{

      display:block;
      margin-top:6px;
      color:#9ca3af;
      font-size:12px;

    }

    .right-area{
      text-align:right;
    }

    .nominal{

      font-weight:700;
      font-size:15px;

    }

    .nominal.in{
      color:#16a34a;
    }

    .nominal.out{
      color:#dc2626;
    }

    .delete-btn{

      margin-top:10px;
      border:none;
      padding:10px 14px;
      border-radius:14px;

      background:#fee2e2;
      color:#dc2626;

      font-family:'Poppins',sans-serif;

    }

    /* LAPORAN */

    .laporan-box{

      display:flex;
      flex-direction:column;
      gap:16px;
      margin-top:20px;

    }

    .laporan-card{

      background:white;
      padding:22px;
      border-radius:28px;

      box-shadow:
      0 8px 30px rgba(15,23,42,.06);

    }

    .laporan-card p{

      color:#6b7280;
      margin-bottom:10px;

    }

    .laporan-card h3{

      font-size:30px;
      color:#16a34a;

    }

    /* FAB */

    .fab{

      position:fixed;
      right:24px;
      bottom:95px;

      width:68px;
      height:68px;

      border-radius:999px;
      border:none;

      background:
      linear-gradient(
        135deg,
        #16a34a,
        #15803d
      );

      color:white;
      font-size:24px;

      display:flex;
      justify-content:center;
      align-items:center;

      box-shadow:
      0 15px 30px rgba(22,163,74,.3);

    }

    /* NAVIGATION */

    .bottom-nav{

      position:fixed;
      left:0;
      right:0;
      bottom:0;

      background:
      rgba(255,255,255,.96);

      backdrop-filter:blur(14px);

      border-top:
      1px solid rgba(0,0,0,.05);

      box-shadow:
      0 -10px 30px rgba(0,0,0,.05);

    }

    .nav-grid{

      max-width:480px;
      margin:auto;

      display:grid;
      grid-template-columns:repeat(3,1fr);

      padding:12px 0;

    }

    .nav-item{

      text-align:center;
      font-size:12px;
      color:#6b7280;

    }

    .nav-item.active{
      color:#16a34a;
    }

    .nav-icon{

      width:44px;
      height:44px;

      margin:auto;
      margin-bottom:6px;

      border-radius:16px;
      background:#f3f4f6;

      display:flex;
      justify-content:center;
      align-items:center;

      transition:.3s;

    }

    .nav-item.active .nav-icon{

      background:#dcfce7;
      transform:translateY(-4px);

    }

    /* MODAL */

    .modal{

      position:fixed;
      inset:0;

      background:rgba(0,0,0,.4);

      display:flex;
      align-items:end;

    }

    .hidden{
      display:none;
    }

    .modal-content{

      width:100%;
      max-width:480px;
      margin:auto;

      background:white;

      border-radius:36px 36px 0 0;

      padding:24px;

    }

    /* SIMPLE PAGE */

    .simple-page{

      padding:30px 20px 20px;

    }

    .simple-page h2{

      font-size:28px;
      margin-bottom:10px;

    }

  </style>

</head>

<body>

<div class="app">

  <!-- HOME -->

  <section
    id="dashboardPage"
    class="page active-page">

    <div class="header">

      <div class="header-top">

        <div>

          <p class="sub">
            Kas Sampah TUNTAS
          </p>

          <h1>
            Kas TUNTAS
          </h1>

          <p class="welcome">
            Kelola kas sampah realtime
          </p>

        </div>

      </div>

      <div class="saldo-card">

        <p class="saldo-label">
          Total Saldo
        </p>

        <h2 id="saldo">
          Rp0
        </h2>

        <div class="summary">

          <div class="summary-item income">

            <span>Kas Masuk</span>

            <h3 id="masuk">
              Rp0
            </h3>

          </div>

          <div class="summary-item expense">

            <span>Kas Keluar</span>

            <h3 id="keluar">
              Rp0
            </h3>

          </div>

        </div>

      </div>

    </div>

    <!-- FILTER -->

    <div class="card">

      <h3 class="section-title">
        Filter Histori
      </h3>

      <div class="filter-box">

        <input
          type="date"
          id="startDate">

        <input
          type="date"
          id="endDate">

      </div>

      <button
        class="filter-btn"
        onclick="filterTanggal()">

        Terapkan Filter

      </button>

    </div>

    <!-- CHART -->

    <div class="card">

      <canvas id="chart"></canvas>

    </div>

  </section>

  <!-- LAPORAN -->

  <section
    id="laporanPage"
    class="page">

    <div class="simple-page">

      <h2>
        <i class="fa-solid fa-chart-pie"></i>
        Laporan
      </h2>

      <div class="laporan-box">

        <div class="laporan-card">

          <p>Total Pemasukan</p>

          <h3 id="lapMasuk">
            Rp0
          </h3>

        </div>

        <div class="laporan-card">

          <p>Total Pengeluaran</p>

          <h3 id="lapKeluar">
            Rp0
          </h3>

        </div>

        <div class="laporan-card">

          <p>Saldo Akhir</p>

          <h3 id="lapSaldo">
            Rp0
          </h3>

        </div>

      </div>

    </div>

  </section>

  <!-- HISTORI -->

  <section
    id="historiPage"
    class="page">

    <div class="simple-page">

      <h2>
        <i class="fa-solid fa-clock-rotate-left"></i>
        Histori
      </h2>

    </div>

    <div
      class="transaksi-list"
      id="listTransaksi">

    </div>

  </section>

</div>

<!-- MODAL -->

<div
  class="modal hidden"
  id="modal">

  <div class="modal-content">

    <h2>
      Tambah Transaksi
    </h2>

    <input
      type="date"
      id="tanggal">

    <select id="jenis">

      <option>
        Masuk
      </option>

      <option>
        Keluar
      </option>

    </select>

    <input
      type="text"
      id="kategori"
      placeholder="Kategori">

    <input
      type="text"
      id="keterangan"
      placeholder="Keterangan">

    <input
      type="number"
      id="nominal"
      placeholder="Nominal">

    <button
      class="save-btn"
      onclick="simpan()">

      Simpan

    </button>

  </div>

</div>

<!-- FAB -->

<button
  class="fab"
  onclick="toggleModal()">

  <i class="fa-solid fa-plus"></i>

</button>

<!-- NAV -->

<div class="bottom-nav">

  <div class="nav-grid">

    <div
      class="nav-item active"
      onclick="showPage('dashboard', this)">

      <div class="nav-icon">

        <i class="fa-solid fa-house"></i>

      </div>

      <p>Home</p>

    </div>

    <div
      class="nav-item"
      onclick="showPage('laporan', this)">

      <div class="nav-icon">

        <i class="fa-solid fa-chart-pie"></i>

      </div>

      <p>Laporan</p>

    </div>

    <div
      class="nav-item"
      onclick="showPage('histori', this)">

      <div class="nav-icon">

        <i class="fa-solid fa-clock-rotate-left"></i>

      </div>

      <p>Histori</p>

    </div>

  </div>

</div>

<script>

const API_URL =
'https://script.google.com/macros/s/AKfycbxv9xeWPqNdqrl7yiY-8mN9IZV9bVTNwk78k-klWiG330wjzvuhIb78JRGtJvm7Yep9Pg/exec';

let chart;

/* FORMAT */

function rupiah(angka){

  return new Intl.NumberFormat(
    'id-ID',
    {
      style:'currency',
      currency:'IDR'
    }
  ).format(angka);

}

/* LOAD DATA */

async function loadData(){

  const res =
  await fetch(API_URL);

  const data =
  await res.json();

  renderData(data);

}

/* RENDER */

function renderData(data){

  let totalMasuk = 0;
  let totalKeluar = 0;

  const list =
  document.getElementById(
    'listTransaksi'
  );

  list.innerHTML = '';

  data.reverse().forEach(item => {

    const nominal =
    Number(item.nominal);

    const isMasuk =
    item.jenis === 'Masuk';

    if(isMasuk){

      totalMasuk += nominal;

    }else{

      totalKeluar += nominal;

    }

    list.innerHTML += `

      <div class="transaksi-item">

        <div class="transaksi-left">

          <div class="icon ${
            isMasuk ? 'in' : 'out'
          }">

            ${
              isMasuk

              ?

              '<i class="fa-solid fa-arrow-down"></i>'

              :

              '<i class="fa-solid fa-arrow-up"></i>'

            }

          </div>

          <div class="transaksi-info">

            <h3>
              ${item.kategori}
            </h3>

            <p>
              ${item.keterangan}
            </p>

            <small>
              ${item.tanggal}
            </small>

          </div>

        </div>

        <div class="right-area">

          <div class="nominal ${
            isMasuk ? 'in' : 'out'
          }">

            ${rupiah(nominal)}

          </div>

          <button
            class="delete-btn"
            onclick="hapus('${item.id}')">

            Hapus

          </button>

        </div>

      </div>

    `;

  });

  document.getElementById(
    'masuk'
  ).innerText =
  rupiah(totalMasuk);

  document.getElementById(
    'keluar'
  ).innerText =
  rupiah(totalKeluar);

  document.getElementById(
    'saldo'
  ).innerText =
  rupiah(
    totalMasuk - totalKeluar
  );

  document.getElementById(
    'lapMasuk'
  ).innerText =
  rupiah(totalMasuk);

  document.getElementById(
    'lapKeluar'
  ).innerText =
  rupiah(totalKeluar);

  document.getElementById(
    'lapSaldo'
  ).innerText =
  rupiah(
    totalMasuk - totalKeluar
  );

  renderChart(
    totalMasuk,
    totalKeluar
  );

}

/* CHART */

function renderChart(
  masuk,
  keluar
){

  const ctx =
  document.getElementById(
    'chart'
  );

  if(chart){

    chart.destroy();

  }

  chart = new Chart(ctx, {

    type:'doughnut',

    data:{

      labels:[
        'Masuk',
        'Keluar'
      ],

      datasets:[{

        data:[
          masuk,
          keluar
        ],

        borderRadius:12

      }]

    }

  });

}

/* FILTER */

async function filterTanggal(){

  const start =
  document.getElementById(
    'startDate'
  ).value;

  const end =
  document.getElementById(
    'endDate'
  ).value;

  const res =
  await fetch(API_URL);

  const data =
  await res.json();

  const filtered =
  data.filter(item => {

    const tgl =
    new Date(item.tanggal);

    return (

      (!start ||
        tgl >= new Date(start))

      &&

      (!end ||
        tgl <= new Date(end))

    );

  });

  renderData(filtered);

}

/* MODAL */

function toggleModal(){

  document
  .getElementById('modal')
  .classList
  .toggle('hidden');

}

/* SIMPAN */

async function simpan(){

  const payload = {

    action:'simpan',

    tanggal:
    document.getElementById(
      'tanggal'
    ).value,

    jenis:
    document.getElementById(
      'jenis'
    ).value,

    kategori:
    document.getElementById(
      'kategori'
    ).value,

    keterangan:
    document.getElementById(
      'keterangan'
    ).value,

    nominal:
    document.getElementById(
      'nominal'
    ).value

  };

  await fetch(API_URL, {

    method:'POST',

    headers:{
      'Content-Type':'text/plain'
    },

    body:JSON.stringify(payload)

  });

  toggleModal();

  loadData();

}

/* HAPUS */

async function hapus(id){

  await fetch(API_URL, {

    method:'POST',

    headers:{
      'Content-Type':'text/plain'
    },

    body:JSON.stringify({

      action:'hapus',

      id:id

    })

  });

  loadData();

}

/* NAVIGATION */

function showPage(
  page,
  element
){

  document
  .querySelectorAll('.page')
  .forEach(el => {

    el.classList.remove(
      'active-page'
    );

  });

  document
  .querySelectorAll('.nav-item')
  .forEach(el => {

    el.classList.remove(
      'active'
    );

  });

  document
  .getElementById(
    page + 'Page'
  )
  .classList.add(
    'active-page'
  );

  element.classList.add(
    'active'
  );

}

/* INIT */

loadData();

</script>

</body>
</html>
