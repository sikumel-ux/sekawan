<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Dashboard Anggota</title>

  <link rel="stylesheet"
    href="anggota.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

  <!-- HEADER -->

  <div class="header">

    <div class="header-top">

      <div>

        <p class="sub">
          Kas Sampah TUNTAS
        </p>

        <h1>
          Dashboard Anggota
        </h1>

      </div>

      <button
        class="logout-btn"
        onclick="logout()">

        Logout

      </button>

    </div>

    <!-- SALDO -->

    <div class="saldo-card">

      <p class="saldo-label">
        Total Saldo
      </p>

      <h2 id="saldo">
        Rp0
      </h2>

      <div class="summary">

        <div class="summary-item income">

          <span>Kas Masuk</span>

          <h3 id="masuk">
            Rp0
          </h3>

        </div>

        <div class="summary-item expense">

          <span>Kas Keluar</span>

          <h3 id="keluar">
            Rp0
          </h3>

        </div>

      </div>

    </div>

  </div>

  <!-- FILTER -->

  <div class="card">

    <h3 class="section-title">
      Filter Histori
    </h3>

    <div class="filter-box">

      <input
        type="date"
        id="startDate">

      <input
        type="date"
        id="endDate">

    </div>

    <button
      class="filter-btn"
      onclick="filterTanggal()">

      Terapkan Filter

    </button>

  </div>

  <!-- CHART -->

  <div class="card">

    <div class="chart-header">

      <h3>
        Cashflow
      </h3>

      <span>
        Bulan Ini
      </span>

    </div>

    <canvas id="chart"></canvas>

  </div>

  <!-- TRANSAKSI -->

  <div
    class="transaksi-list"
    id="listTransaksi">

  </div>

</div>

<!-- NAVIGATION -->

<div class="bottom-nav">

  <div class="nav-grid">

    <div class="nav-item active">

      <div class="nav-icon">
        🏠
      </div>

      <p>Home</p>

    </div>

    <div class="nav-item">

      <div class="nav-icon">
        📊
      </div>

      <p>Laporan</p>

    </div>

    <div class="nav-item">

      <div class="nav-icon">
        📅
      </div>

      <p>Histori</p>

    </div>

    <div class="nav-item">

      <div class="nav-icon">
        👤
      </div>

      <p>Akun</p>

    </div>

  </div>

</div>

<script>

const API_URL =
  'https://script.google.com/macros/s/AKfycbxv9xeWPqNdqrl7yiY-8mN9IZV9bVTNwk78k-klWiG330wjzvuhIb78JRGtJvm7Yep9Pg/exec';

let chart;

/* CEK LOGIN */

const user =
  JSON.parse(
    localStorage.getItem('user')
  );

if (!user) {

  window.location.href =
    'login.html';

}

/* LOGOUT */

function logout() {

  localStorage.clear();

  window.location.href =
    'login.html';

}

/* FORMAT RUPIAH */

function rupiah(angka) {

  return new Intl.NumberFormat(
    'id-ID',
    {
      style: 'currency',
      currency: 'IDR'
    }
  ).format(angka);

}

/* LOAD DATA */

async function loadData() {

  const res =
    await fetch(API_URL);

  const data =
    await res.json();

  renderData(data);

}

/* RENDER */

function renderData(data) {

  let totalMasuk = 0;
  let totalKeluar = 0;

  const list =
    document.getElementById(
      'listTransaksi'
    );

  list.innerHTML = '';

  data.reverse().forEach(item => {

    if (item.jenis === 'Masuk') {

      totalMasuk += item.nominal;

    } else {

      totalKeluar += item.nominal;

    }

    const isMasuk =
      item.jenis === 'Masuk';

    list.innerHTML += `

      <div class="transaksi-item">

        <div class="transaksi-left">

          <div class="icon ${
            isMasuk ? 'in' : 'out'
          }">

            ${
              isMasuk ? '⬇️' : '⬆️'
            }

          </div>

          <div class="transaksi-info">

            <h3>
              ${item.kategori}
            </h3>

            <p>
              ${item.keterangan}
            </p>

            <small>
              ${item.tanggal}
            </small>

          </div>

        </div>

        <div class="nominal ${
          isMasuk ? 'in' : 'out'
        }">

          ${rupiah(item.nominal)}

        </div>

      </div>

    `;

  });

  document.getElementById('masuk')
    .innerText =
      rupiah(totalMasuk);

  document.getElementById('keluar')
    .innerText =
      rupiah(totalKeluar);

  document.getElementById('saldo')
    .innerText =
      rupiah(
        totalMasuk - totalKeluar
      );

  renderChart(
    totalMasuk,
    totalKeluar
  );

}

/* FILTER */

async function filterTanggal() {

  const start =
    document.getElementById(
      'startDate'
    ).value;

  const end =
    document.getElementById(
      'endDate'
    ).value;

  const res =
    await fetch(API_URL);

  const data =
    await res.json();

  const filtered =
    data.filter(item => {

      const tgl =
        new Date(item.tanggal);

      return (

        (!start ||
          tgl >= new Date(start))

        &&

        (!end ||
          tgl <= new Date(end))

      );

    });

  renderData(filtered);

}

/* CHART */

function renderChart(
  masuk,
  keluar
) {

  const ctx =
    document.getElementById(
      'chart'
    );

  if (chart) {

    chart.destroy();

  }

  chart = new Chart(ctx, {

    type: 'doughnut',

    data: {

      labels: [
        'Kas Masuk',
        'Kas Keluar'
      ],

      datasets: [{

        data: [
          masuk,
          keluar
        ],

        borderRadius: 14

      }]

    }

  });

}

loadData();

</script>

</body>
</html>
