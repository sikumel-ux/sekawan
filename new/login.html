<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Login - Kas Sampah TUNTAS</title>

  <link rel="stylesheet"
    href="style.css">

</head>

<body class="login-body">

<div class="login-container">

  <div class="login-card">

    <div class="logo">
      🍃
    </div>

    <p class="subtitle">
      Kas Sampah TUNTAS
    </p>

    <h1 class="title">
      Smart Finance
    </h1>

    <div class="form-group">

      <input
        type="email"
        id="email"
        placeholder="Email">

      <input
        type="password"
        id="password"
        placeholder="Password">

      <button onclick="login()">
        Login
      </button>

    </div>

  </div>

</div>

<script src="auth.js"></script>

</body>
</html>
