<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Login - Kas Sampah TUNTAS</title>

  <link rel="stylesheet"
    href="login.css">

</head>

<body>

  <!-- BACKGROUND -->

  <div class="blur blur1"></div>


  <!-- LOGIN CARD -->

  <div class="login-card">

    <div class="logo">
      🍃
    </div>

    <p class="subtitle">
      Laporan Kas Sampah
    </p>

    <h1 class="title">
      TUNTAS
    </h1>

    

    <!-- FORM -->

    <div class="form-group">

      <div class="input-group">

        <span class="icon">
          ✉️
        </span>

        <input
          type="email"
          id="email"
          placeholder="Email">

      </div>

      <div class="input-group">

        <span class="icon">
          🔒
        </span>

        <input
          type="password"
          id="password"
          placeholder="Password">

      </div>

      <button
        class="login-btn"
        onclick="login()">

        Login

      </button>

    </div>

    <div class="footer">

      Sekawan © 2026<br>
      TUNTAS - Turun Tangan Atasi Sampah

    </div>

  </div>

  <script>

    const API_URL =
      'https://script.google.com/macros/s/AKfycbxv9xeWPqNdqrl7yiY-8mN9IZV9bVTNwk78k-klWiG330wjzvuhIb78JRGtJvm7Yep9Pg/exec';

    async function login() {

      const email =
        document.getElementById('email').value;

      const password =
        document.getElementById('password').value;

      if (!email || !password) {

        alert('Isi email dan password');

        return;

      }

      try {

        const res =
          await fetch(API_URL, {

            method: 'POST',

            body: JSON.stringify({

              action: 'login',

              email,

              password

            })

          });

        const data =
          await res.json();

        if (data.success) {

          localStorage.setItem(
            'user',
            JSON.stringify(data.user)
          );

          if (
            data.user.role === 'admin'
          ) {

            window.location.href =
              'admin.html';

          } else {

            window.location.href =
              'anggota.html';

          }

        } else {

          alert(
            'Email atau password salah'
          );

        }

      } catch(err) {

        alert(
          'Gagal terhubung ke server'
        );

      }

    }

  </script>

</body>
</html>
