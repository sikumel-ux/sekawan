<script>

let chart;

function rupiah(angka) {

  return new Intl.NumberFormat(
    'id-ID',
    {
      style: 'currency',
      currency: 'IDR'
    }
  ).format(angka);

}

function toggleSheet() {

  document
    .getElementById('bottomSheet')
    .classList
    .toggle('hidden');

}

function loadData() {

  google.script.run
    .withSuccessHandler(data => {

      renderData(data);

    })
    .getTransaksi();

}

function renderData(data) {

  let html = '';

  let totalMasuk = 0;
  let totalKeluar = 0;

  data.reverse().forEach(row => {

    if (row[2] === 'Masuk') {
      totalMasuk += Number(row[5]);
    } else {
      totalKeluar += Number(row[5]);
    }

    const warna =
      row[2] === 'Masuk'
      ? 'text-green-600 bg-green-50'
      : 'text-red-600 bg-red-50';

    const icon =
      row[2] === 'Masuk'
      ? '⬇️'
      : '⬆️';

    html += `

      <div class="premium-card p-4">

        <div class="flex justify-between items-center">

          <div class="flex items-center gap-3">

            <div class="w-12 h-12 rounded-2xl ${warna} flex items-center justify-center text-xl">
              ${icon}
            </div>

            <div>

              <h3 class="font-bold">
                ${row[3]}
              </h3>

              <p class="text-sm text-gray-500">
                ${row[4]}
              </p>

              <p class="text-xs text-gray-400 mt-1">
                ${row[1]}
              </p>

            </div>

          </div>

          <div class="text-right">

            <h3 class="font-bold ${row[2] === 'Masuk' ? 'text-green-600' : 'text-red-600'}">
              ${rupiah(row[5])}
            </h3>

            <button
              onclick="hapus('${row[0]}')"
              class="text-xs text-gray-400 mt-2">
              Hapus
            </button>

          </div>

        </div>

      </div>

    `;

  });

  document
    .getElementById('listTransaksi')
    .innerHTML = html;

  const saldo = totalMasuk - totalKeluar;

  document.getElementById('masuk').innerText =
    rupiah(totalMasuk);

  document.getElementById('keluar').innerText =
    rupiah(totalKeluar);

  document.getElementById('saldo').innerText =
    rupiah(saldo);

  renderChart(totalMasuk, totalKeluar);

}

function renderChart(masuk, keluar) {

  const ctx =
    document.getElementById('chart');

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {

    type: 'doughnut',

    data: {

      labels: [
        'Kas Masuk',
        'Kas Keluar'
      ],

      datasets: [{

        data: [
          masuk,
          keluar
        ],

        borderRadius: 12

      }]

    }

  });

}

function simpan() {

  const data = {

    tanggal:
      document.getElementById('tanggal').value,

    jenis:
      document.getElementById('jenis').value,

    kategori:
      document.getElementById('kategori').value,

    keterangan:
      document.getElementById('keterangan').value,

    nominal:
      document.getElementById('nominal').value

  };

  google.script.run
    .withSuccessHandler(() => {

      toggleSheet();

      loadData();

    })
    .simpanTransaksi(data);

}

function hapus(id) {

  google.script.run
    .withSuccessHandler(() => {

      loadData();

    })
    .hapusTransaksi(id);

}

function filterTanggal() {

  const start =
    document.getElementById('startDate').value;

  const end =
    document.getElementById('endDate').value;

  google.script.run
    .withSuccessHandler(data => {

      const filtered = data.filter(row => {

        const tgl = new Date(row[1]);

        return (
          (!start || tgl >= new Date(start)) &&
          (!end || tgl <= new Date(end))
        );

      });

      renderData(filtered);

    })
    .getTransaksi();

}

/* DARK MODE */

function toggleDarkMode() {

  document.documentElement
    .classList
    .toggle('dark');

}

/* EXPORT PDF */

async function exportPDF() {

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  google.script.run
    .withSuccessHandler(data => {

      let totalMasuk = 0;
      let totalKeluar = 0;

      data.forEach(row => {

        if (row[2] === 'Masuk') {
          totalMasuk += Number(row[5]);
        } else {
          totalKeluar += Number(row[5]);
        }

      });

      const saldo =
        totalMasuk - totalKeluar;

      doc.setFontSize(20);

      doc.text(
        'Laporan Kas Sampah TUNTAS',
        14,
        20
      );

      doc.setFontSize(10);

      doc.text(
        'Generated by Smart Finance App',
        14,
        28
      );

      doc.text(
        `Saldo : Rp ${saldo}`,
        14,
        40
      );

      const tableData = [];

      data.forEach(row => {

        tableData.push([
          row[1],
          row[2],
          row[3],
          row[4],
          `Rp ${Number(row[5]).toLocaleString('id-ID')}`
        ]);

      });

      doc.autoTable({

        startY: 50,

        head: [[
          'Tanggal',
          'Jenis',
          'Kategori',
          'Keterangan',
          'Nominal'
        ]],

        body: tableData,

        theme: 'grid',

        headStyles: {
          fillColor: [22,163,74]
        }

      });

      doc.save(
        'Laporan_Kas_TUNTAS.pdf'
      );

    })
    .getTransaksi();

}

loadData();

</script>
