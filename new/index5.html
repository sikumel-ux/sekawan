<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Kas Sampah TUNTAS</title>

  <link rel="stylesheet"
    href="style.css">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <link rel="manifest"
    href="manifest.json">

</head>

<body>

<div class="app">

  <header class="header">

    <div>

      <p class="sub">
        Kas Sampah TUNTAS
      </p>

      <h1>
        Smart Finance
      </h1>

    </div>

    <button onclick="toggleDarkMode()"
      class="dark-btn">
      🌙
    </button>

  </header>

  <section class="saldo-card">

    <p>Total Saldo</p>

    <h2 id="saldo">
      Rp0
    </h2>

    <div class="summary">

      <div class="income">

        <span>Masuk</span>

        <h3 id="masuk">
          Rp0
        </h3>

      </div>

      <div class="expense">

        <span>Keluar</span>

        <h3 id="keluar">
          Rp0
        </h3>

      </div>

    </div>

  </section>

  <section class="chart-card">

    <canvas id="chart"></canvas>

  </section>

  <section class="filter-card">

    <input type="date"
      id="startDate">

    <input type="date"
      id="endDate">

    <button onclick="filterTanggal()">
      Terapkan
    </button>

  </section>

  <section id="listTransaksi"
    class="transaksi-list">

  </section>

  <button class="fab"
    onclick="toggleModal()">
    +
  </button>

</div>

<!-- MODAL -->

<div id="modal"
  class="modal hidden">

  <div class="modal-content">

    <h2>Tambah Transaksi</h2>

    <input type="date"
      id="tanggal">

    <select id="jenis">

      <option>Masuk</option>
      <option>Keluar</option>

    </select>

    <input type="text"
      id="kategori"
      placeholder="Kategori">

    <input type="text"
      id="keterangan"
      placeholder="Keterangan">

    <input type="number"
      id="nominal"
      placeholder="Nominal">

    <button onclick="simpan()">
      Simpan
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
