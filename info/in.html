<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Visual Pengumuman TUNTAS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* --- CSS INTI BENTO (Unik & Clean) --- */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F1F5F9; 
            background-image: radial-gradient(circle at 2px 2px, #E2E8F0 1px, transparent 0);
            background-size: 32px 32px;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Container Utama untuk Form dan Preview */
        .main-container {
            display: flex;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            align-items: flex-start;
        }

        /* --- Style Bagian FORM (Nggak di-Screenshot) --- */
        .form-section {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #E2E8F0;
            position: sticky;
            top: 40px;
        }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 800;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
            margin-left: 4px;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 16px;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 1rem;
            font-size: 14px;
            color: #1E293B;
            transition: all 0.2s;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #10B981;
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .form-textarea { resize: vertical; min-height: 120px; }

        /* --- Style Bagian PREVIEW (Yang di-Screenshot) --- */
        .preview-section {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        /* Kartu Bento Pengumuman */
        .bento-card { 
            background: white; 
            border-radius: 3rem; 
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 450px; /* Ukuran pas buat di-screenshot HP */
            border: 1px solid rgba(255,255,255,0.8);
            padding: 40px;
        }

        /* Aksen Garis Hijau Tebal di Atas */
        .line-accent { 
            height: 20px; 
            background: #064E3B; /* Emerald Tua */
            width: 100%; 
            position: absolute; 
            top: 0; 
            left: 0;
            z-index: 10;
        }

        /* Kotak Isi Pengumuman (Aksen Muda) */
        .content-box {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); /* Emerald Super Muda */
            padding: 30px;
            border-radius: 2.5rem;
            border: 1px solid #d1fae5;
            margin-bottom: 30px;
            min-height: 200px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        /* Tipografi Preview */
        .preview-title {
            font-size: 16px;
            font-weight: 900;
            color: #064E3B;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .preview-text {
            font-size: 14px;
            color: #334155;
            line-height: 1.6;
            font-weight: 500;
            white-space: pre-line; /* Penting biar enter-nya fungsi */
        }

        /* Footer Screenshot */
        .screenshot-footer {
