<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Pengumuman TUNTAS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- RESET & BASE --- */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #F1F5F9; 
            background-image: radial-gradient(circle at 2px 2px, #CBD5E1 1px, transparent 0);
            background-size: 32px 32px;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .main-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            padding-top: 40px;
        }

        /* --- EDITOR SECTION (KIRI) --- */
        .editor-container {
            flex: 1;
            min-width: 320px;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            height: fit-content;
        }

        .editor-header { text-align: center; margin-bottom: 30px; }
        .editor-header h1 { font-weight: 900; color: #1E293B; margin: 0; font-size: 20px; }
        
        .field { margin-bottom: 20px; }
        .label { 
            display: block; font-size: 11px; font-weight: 800; color: #64748B; 
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
        }
        .input, .textarea {
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #F1F5F9;
            background: #F8FAFC; font-family: inherit; font-size: 14px; outline: none;
        }
        .input:focus, .textarea:focus { border-color: #10B981; background: white; }
        .textarea { height: 120px; resize: none; }

        /* --- PREVIEW SECTION (KANAN - UNTUK DI SCREENSHOT) --- */
        .preview-container {
            flex: 1;
            min-width: 320px;
            display: flex;
            justify-content: center;
        }

        .bento-card {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            padding: 40px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .top-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 16px; background: #064E3B;
        }

        .brand-header { text-align: center; margin-bottom: 30px; }
        .brand-name { font-weight: 900; font-size: 32px; color: #064E3B; margin: 0; letter-spacing: -2px; }
        .brand-tagline { font-size: 10px; font-weight: 700; color: #10B981; text-transform: uppercase; letter-spacing: 0.3em; margin-top: 4px; }

        .title-box { text-align: center; margin-top: 24px; }
        .title-box h2 { font-weight: 900; font-size: 18px; color: #334155; margin: 0; letter-spacing: 0.05em; }
        .title-line { width: 40px; height: 4px; background: #10B981; margin: 8px auto; border-radius: 10px; }

        .content-area {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            padding: 24px;
            border-radius: 24px;
            margin: 24px 0;
            border: 1px solid #BBF7D0;
        }
        .p-judul { font-weight: 900; font-size: 15px; color: #064E3B; margin-bottom: 8px; text-transform: uppercase; }
        .p-isi { font-size: 13px; color: #334155; line-height: 1.6; font-weight: 500; white-space: pre-line; }

        .footer-info { margin-top: 24px; }
        .date-pill {
            display: inline-flex; background: #F8FAFC; padding: 8px 16px; border-radius: 50px;
            border: 1px solid #E2E8F0; font-size: 11px; font-weight: 700; color: #64748B;
        }
        .date-pill span { color: #1E293B; margin-left: 5px; }

        .signature { text-align: right; margin-top: 30px; border-top: 2px dashed #F1F5F9; pt-20px; padding-top: 20px;}
        .sig-label { font-size: 9px; font-weight: 800; color: #94A3B8; text-transform: uppercase; }
        .sig-name { font-weight: 900; font-size: 14px; color: #064E3B; margin-top: 10px; }

        /* Responsive */
        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; }
            .editor-container, .preview-container { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="editor-container">
            <div class="editor-header">
                <i class="fa-solid fa-gear" style="color: #10B981; font-size: 30px; margin-bottom: 10px;"></i>
                <h1>TUNTAS EDITOR</h1>
            </div>

            <div class="field">
                <label class="label">Judul Info</label>
                <input type="text" id="in-judul" class="input" placeholder="Misal: Kerja Bakti">
            </div>

            <div class="field">
                <label class="label">Isi Pengumuman</label>
                <textarea id="in-isi" class="textarea" placeholder="Tulis info di sini..."></textarea>
            </div>

            <div class="field">
                <label class="label">Tanggal</label>
                <input type="date" id="in-tgl" class="input">
            </div>

            <p style="font-size: 11px; color: #94A3B8; text-align: center; margin-top: 20px;">
                <i class="fa-solid fa-camera"></i> Screenshot hasil di sebelah kanan/bawah.
            </p>
        </div>

        <div class="preview-container">
            <div class="bento-card">
                <div class="top-line"></div>
                
                <div class="brand-header">
                    <h1 class="brand-name">TUNTAS.</h1>
                    <div class="brand-tagline">Turun Tangan Atasi Sampah</div>
                </div>

                <div class="title-box">
                    <h2>PENGUMUMAN</h2>
                    <div class="title-line"></div>
                </div>

                <div class="content-area">
                    <div id="p-judul" class="p-judul">JUDUL PENGUMUMAN</div>
                    <div id="p-isi" class="p-isi">Isi pengumuman akan tampil otomatis di sini saat Anda mengetik di editor.</div>
                </div>

                <div class="footer-info">
                    <div class="date-pill">
                        TANGGAL: <span id="p-tgl">-</span>
                    </div>
                    
                    <div class="signature">
                        <div class="sig-label">Tertanda,</div>
                        <div class="sig-name">TUNTAS RT 04</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inJudul = document.getElementById('in-judul');
        const inIsi = document.getElementById('in-isi');
        const inTgl = document.getElementById('in-tgl');

        const pJudul = document.getElementById('p-judul');
        const pIsi = document.getElementById('p-isi');
        const pTgl = document.getElementById('p-tgl');

        function update() {
            pJudul.innerText = inJudul.value || "JUDUL PENGUMUMAN";
            pIsi.innerText = inIsi.value || "Isi pengumuman akan tampil di sini...";
            
            if (inTgl.value) {
                const d = new Date(inTgl.value);
                pTgl.innerText = d.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            }
        }

        inJudul.addEventListener('input', update);
        inIsi.addEventListener('input', update);
        inTgl.addEventListener('change', update);

        // Set Default Hari Ini
        inTgl.valueAsDate = new Date();
        update();
    </script>
</body>
                                   </html>
