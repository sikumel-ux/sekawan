<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tuntas. - Masuk Akun</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-xl space-y-6">
        <div class="text-center space-y-2">
            <div class="w-24 h-24 mx-auto drop-shadow-sm flex items-center justify-center">
                <img src="login.png" alt="Logo Tuntas" class="w-full h-full object-contain">
            </div>
            <h1 class="text-2xl font-black text-emerald-900 tracking-tight mt-3">TUNTAS.</h1>
            
        </div>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1 tracking-wider">Nomor WhatsApp Warga</label>
                <input type="number" id="loginHp" class="modern-in" placeholder="Contoh: 6281234xxx" required>
            </div>
            
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase px-1 tracking-wider">Password / Kata Sandi</label>
                <input type="password" id="loginPassword" class="modern-in" placeholder="••••••••" required>
            </div>

            <div id="errorMsg" class="hidden text-xs bg-red-50 text-red-600 font-bold p-3 rounded-xl text-center border border-red-100"></div>

            <button id="btnLogin" class="w-full bg-emerald-900 text-white p-5 rounded-2xl font-black shadow-lg uppercase text-xs tracking-wider active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                Masuk ke Aplikasi
            </button>
        </div>
    </div>

    <footer class="mt-6 text-center">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
            &copy; 2026 TUNTAS. All Rights Reserved.
        </p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
