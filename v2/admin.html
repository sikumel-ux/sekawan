<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS Admin - RT 04</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link rel="stylesheet" href="style.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { primary: '#166534', accent: '#84cc16', dark: '#0f172a' }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-slate-800">

    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-slate-100 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg">
                <i class="fa-solid fa-user-shield text-sm"></i>
            </div>
            <div>
                <h1 class="text-sm font-extrabold text-primary leading-none uppercase italic">Admin TUNTAS</h1>
                <p class="text-[9px] font-bold text-slate-400 tracking-widest uppercase">RT 04 Management</p>
            </div>
        </div>
        <button onclick="location.reload()" class="w-9 h-9 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 border border-slate-100">
            <i class="fa-solid fa-arrows-rotate text-xs"></i>
        </button>
    </header>

    <main class="pt-24 pb-32 px-6">
        
        <div id="screen-home" class="tab-content active space-y-8">
            <section class="bg-primary rounded-[32px] p-7 text-white shadow-2xl shadow-green-200/40 relative overflow-hidden">
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-1">Total Saldo RT 04</p>
                <h2 id="totalSaldo" class="text-3xl font-extrabold tracking-tighter">Rp 0</h2>
                <div class="grid grid-cols-2 gap-4 mt-6 pt-6 border-t border-white/10">
                    <div>
                        <p class="text-[9px] opacity-60 uppercase font-bold">Masuk</p>
                        <p id="totalMasuk" class="text-xs font-extrabold text-accent">Rp 0</p>
                    </div>
                    <div class="border-l border-white/10 ps-4">
                        <p class="text-[9px] opacity-60 uppercase font-bold">Keluar</p>
                        <p id="totalKeluar" class="text-xs font-extrabold text-red-300">Rp 0</p>
                    </div>
                </div>
            </section>

            <section>
                <h3 class="font-extrabold text-sm uppercase tracking-tight mb-4">Histori Transaksi</h3>
                <div id="listRiwayat" class="space-y-3">
                    </div>
            </section>
        </div>

        <div id="screen-warga" class="tab-content space-y-6">
            <div class="flex justify-between items-center px-1">
                <h3 class="font-extrabold text-lg text-primary uppercase italic">Daftar Anggota</h3>
                <button class="w-10 h-10 bg-primary text-white rounded-xl shadow-lg flex items-center justify-center active:scale-90 transition-transform">
                    <i class="fa-solid fa-plus text-xs"></i>
                </button>
            </div>
            <div id="tBodyWarga" class="space-y-3">
                </div>
        </div>

        <div id="screen-rekap" class="tab-content space-y-6">
            <h3 class="font-extrabold text-lg text-primary uppercase px-1">Rekap Iuran 2026</h3>
            <div class="table-container shadow-sm border border-slate-100">
                <table class="w-full text-left">
                    <thead>
                        <tr id="th-rekap" class="text-[10px] uppercase font-bold text-slate-400"></tr>
                    </thead>
                    <tbody id="tb-rekap" class="text-[10px] font-bold"></tbody>
                    <tfoot id="tf-rekap"></tfoot>
                </table>
            </div>
        </div>

        <div id="screen-konten" class="tab-content space-y-6">
            <h3 class="font-extrabold text-lg text-primary uppercase px-1">Giat Warga</h3>
            <div class="bg-white p-6 rounded-[28px] border-2 border-dashed border-primary/20 space-y-3">
                <input type="text" id="newsTitle" placeholder="Judul Berita" class="input-admin">
                <input type="text" id="newsImg" placeholder="Link Foto (Unsplash)" class="input-admin">
                <div class="grid grid-cols-2 gap-3">
                    <input type="date" id="newsDate" class="input-admin">
                    <button onclick="saveNews()" id="btnSaveNews" class="bg-primary text-white rounded-xl font-extrabold text-[10px] uppercase tracking-widest active:scale-95 transition-all">Posting</button>
                </div>
            </div>
            <div id="listAdminBerita" class="space-y-4"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 px-8 pt-3 pb-8 z-50 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
        <button id="n-home" onclick="st('home')" class="nav-btn active">
            <i class="fa-solid fa-grip text-lg"></i>
            <span>Dash</span>
        </button>
        <button id="n-warga" onclick="st('warga')" class="nav-btn">
            <i class="fa-solid fa-users-viewfinder text-lg"></i>
            <span>Warga</span>
        </button>
        <button id="n-konten" onclick="st('konten')" class="nav-btn">
            <i class="fa-solid fa-newspaper text-lg"></i>
            <span>Konten</span>
        </button>
        <button id="n-rekap" onclick="st('rekap')" class="nav-btn">
            <i class="fa-solid fa-file-invoice-dollar text-lg"></i>
            <span>Rekap</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
