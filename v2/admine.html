<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNTAS Admin - Control Center</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }, colors: { primary: '#166534' } } }
        }
    </script>
    <style>
        .input-admin { @apply w-full bg-slate-50 border border-slate-100 rounded-2xl px-5 py-4 text-xs font-bold focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all mb-4; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#F8FAF8] font-sans text-slate-800" x-data="{ menu: 'kas' }">

    <header class="bg-white border-b border-slate-100 px-6 py-5 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-lg font-black italic text-primary uppercase leading-none">Admin Tuntas</h1>
            <p class="text-[8px] font-black text-slate-300 uppercase tracking-widest mt-1 italic">RT 04 Management System</p>
        </div>
        <div class="flex gap-2">
            <button @click="menu = 'kas'" :class="menu === 'kas' ? 'bg-primary text-white' : 'bg-slate-50 text-slate-400'" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all">Kas</button>
            <button @click="menu = 'blog'" :class="menu === 'blog' ? 'bg-primary text-white' : 'bg-slate-50 text-slate-400'" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all">Blog</button>
            <button @click="menu = 'warga'" :class="menu === 'warga' ? 'bg-primary text-white' : 'bg-slate-50 text-slate-400'" class="px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all">Iuran</button>
        </div>
    </header>

    <main class="p-6 max-w-2xl mx-auto pb-24">

        <div x-show="menu === 'kas'" x-cloak class="space-y-6">
            <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                <h3 class="font-black italic uppercase text-sm mb-6 text-slate-700">Catat Transaksi Kas</h3>
                <input type="text" id="kasKet" placeholder="Keterangan (Contoh: Beli Lampu RT)" class="input-admin">
                <input type="number" id="kasNom" placeholder="Nominal (Tanpa titik)" class="input-admin">
                <select id="kasKat" class="input-admin">
                    <option value="Masuk">Uang Masuk</option>
                    <option value="Keluar">Uang Keluar</option>
                </select>
                <input type="date" id="kasTgl" class="input-admin">
                <button onclick="saveKas()" id="btnKas" class="w-full bg-primary text-white py-5 rounded-[24px] font-black uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-green-100 active:scale-95 transition-all">
                    Simpan Transaksi
                </button>
            </div>
        </div>

        <div x-show="menu === 'blog'" x-cloak class="space-y-6">
            <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                <h3 class="font-black italic uppercase text-sm mb-6 text-slate-700">Posting Giat Warga</h3>
                <input type="text" id="newsJudul" placeholder="Judul Kegiatan" class="input-admin">
                <input type="text" id="newsImg" placeholder="Link Foto (Unsplash/ImgBB)" class="input-admin">
                <textarea id="newsIsi" placeholder="Tulis cerita kegiatan di sini..." class="input-admin h-32 py-4 resize-none"></textarea>
                <input type="date" id="newsTgl" class="input-admin">
                <button onclick="saveNews()" id="btnNews" class="w-full bg-primary text-white py-5 rounded-[24px] font-black uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-green-100 active:scale-95 transition-all">
                    Publish Berita
                </button>
            </div>
        </div>

        <div x-show="menu === 'warga'" x-cloak class="space-y-6">
            <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                <h3 class="font-black italic uppercase text-sm mb-6 text-slate-700">Input Iuran Sampah</h3>
                <input type="text" id="iurNama" placeholder="Nama Warga" class="input-admin">
                <input type="number" id="iurNom" placeholder="Nominal Iuran" class="input-admin">
                <input type="month" id="iurBulan" class="input-admin">
                <button onclick="saveIuran()" id="btnIur" class="w-full bg-primary text-white py-5 rounded-[24px] font-black uppercase text-[10px] tracking-[0.2em] shadow-lg shadow-green-100 active:scale-95 transition-all">
                    Input Pembayaran
                </button>
            </div>
        </div>

    </main>

    <div class="fixed bottom-0 w-full bg-white border-t border-slate-100 p-4 text-center">
        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">Logged in as Administrator RT 04</p>
    </div>

    <script src="app-admin.js"></script>
</body>
</html>
