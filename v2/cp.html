<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS CP - RT 04</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <link rel="stylesheet" href="cp.css?v=1.3">
    
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }, colors: { primary: '#166534' } } }
        }
    </script>
</head>
<body class="font-sans text-slate-800">

    <div id="loginPage" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center p-8">
        <div class="w-16 h-16 bg-primary rounded-[24px] flex items-center justify-center mb-6 shadow-xl shadow-green-100">
            <i class="fa-solid fa-leaf text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black italic tracking-tighter text-primary uppercase mb-2">Tuntas CP</h1>
        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-10 italic">Management RT 04 System</p>
        
        <div class="w-full max-w-xs space-y-4">
            <input type="email" id="email" placeholder="Email Admin" class="input-admin">
            <input type="password" id="pass" placeholder="Password" class="input-admin">
            <button onclick="login()" class="w-full bg-primary text-white py-5 rounded-[24px] font-black uppercase text-[10px] tracking-widest shadow-lg active:scale-95 transition-all">Masuk Panel</button>
        </div>
    </div>

    <div id="mainApp" x-data="{ activeTab: 'home' }" class="hidden">
        
        <header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-50 px-6 py-4 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="text-lg font-black tracking-tighter text-primary italic leading-none uppercase">Admin CP</h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1 italic">RT 04 Panggungharjo</p>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-2xl bg-red-50 text-red-400 flex items-center justify-center border border-red-100 active:scale-90 transition-all">
                <i class="fa-solid fa-power-off text-xs"></i>
            </button>
        </header>

        <main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">

            <div id="screen-home" class="tab-content active space-y-6">
                <section class="bg-white p-7 rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/40 text-center">
                    <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest mb-1 italic">Total Saldo Terkini</p>
                    <h2 id="totalSaldo" class="text-3xl font-black tracking-tighter text-primary italic">Rp 0</h2>
                    <div class="grid grid-cols-2 gap-4 mt-6 pt-5 border-t border-slate-50">
                        <div><p class="text-[8px] font-bold text-slate-300 uppercase">In</p><p id="totalMasuk" class="text-xs font-black text-emerald-600 italic">Rp 0</p></div>
                        <div><p class="text-[8px] font-bold text-slate-300 uppercase">Out</p><p id="totalKeluar" class="text-xs font-black text-red-500 italic">Rp 0</p></div>
                    </div>
                </section>

                <div class="flex justify-between items-end px-1">
                    <h3 class="font-black italic text-sm uppercase tracking-tighter text-slate-700">Riwayat Kas</h3>
                    <div class="flex gap-2">
                        <input type="date" id="fStart" onchange="loadData()" class="text-[9px] font-bold bg-white border border-slate-100 rounded-lg px-2 py-1">
                        <input type="date" id="fEnd" onchange="loadData()" class="text-[9px] font-bold bg-white border border-slate-100 rounded-lg px-2 py-1">
                    </div>
                </div>
                <div id="listRiwayat" class="space-y-3"></div>
            </div>

            <div id="screen-iuran" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                    <h3 class="font-black italic uppercase text-xs mb-6 text-primary italic">Input Iuran Sampah</h3>
                    <select id="iNama" class="input-admin"></select>
                    <div id="gridBulan" class="grid grid-cols-3 gap-2 mb-6"></div>
                    <input type="number" id="iNom" placeholder="NOMINAL (RP)" class="input-admin">
                    <input type="date" id="iTgl" class="input-admin">
                    <button onclick="simpanIuran()" class="w-full bg-primary text-white py-5 rounded-[24px] font-black uppercase text-[10px] tracking-widest shadow-lg shadow-green-100">Simpan & Kirim WA</button>
                </div>
                <div class="overflow-x-auto no-scrollbar bg-white rounded-3xl border border-slate-100">
                    <table class="w-full text-[10px] border-collapse">
                        <thead><tr id="th-rekap" class="bg-slate-50 text-slate-400 uppercase italic"></tr></thead>
                        <tbody id="tb-rekap" class="text-slate-600 italic"></tbody>
                        <tfoot id="tf-rekap"></tfoot>
                    </table>
                </div>
            </div>

            <div id="screen-giat" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm">
                    <h3 class="font-black italic uppercase text-xs mb-6 text-primary tracking-widest">Update Giat Warga</h3>
                    <input type="text" id="bJudul" placeholder="JUDUL KEGIATAN" class="input-admin">
                    <input type="text" id="bImg" placeholder="LINK GAMBAR (URL)" class="input-admin">
                    <textarea id="bIsi" placeholder="ISI BERITA/CERITA..." class="input-admin h-32 py-4 resize-none"></textarea>
                    <input type="date" id="bTgl" class="input-admin">
                    <button onclick="simpanBerita()" class="w-full bg-primary text-white py-5 rounded-[24px] font-black uppercase text-[10px] shadow-lg">Publish Giat</button>
                </div>
                <div id="listBeritaAdmin" class="space-y-3"></div>
            </div>

            <div id="screen-master" class="tab-content space-y-6">
                <div class="bg-white p-7 rounded-[32px] border border-slate-100 shadow-sm">
                    <h3 class="font-black italic uppercase text-[10px] mb-4 text-slate-400">Tambah Anggota Warga</h3>
                    <input type="text" id="aNama" placeholder="NAMA LENGKAP" class="input-admin">
                    <input type="text" id="aHp" placeholder="WHATSAPP (08...)" class="input-admin">
                    <button onclick="simpanAnggota()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg">Tambah Warga</button>
                </div>
                <div class="bg-white p-7 rounded-[32px] border border-slate-100 shadow-sm">
                    <h3 class="font-black italic uppercase text-[10px] mb-4 text-slate-400 italic">Kas Masuk/Keluar RT</h3>
                    <input type="text" id="kKet" placeholder="KETERANGAN" class="input-admin">
                    <input type="number" id="kNom" placeholder="NOMINAL" class="input-admin">
                    <select id="kKat" class="input-admin"><option value="Keluar">Keluar</option><option value="Masuk">Masuk</option></select>
                    <input type="date" id="kTgl" class="input-admin">
                    <button onclick="simpanKas()" class="w-full bg-primary text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg">Simpan Kas</button>
                </div>
                <div id="tBodyWarga" class="space-y-2"></div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 px-6 pt-3 pb-8 z-50 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
            <button id="n-home" onclick="st('home')" class="nav-btn active"><i class="fa-solid fa-chart-pie text-lg"></i><span>Dash</span></button>
            <button id="n-iuran" onclick="st('iuran')" class="nav-btn"><i class="fa-solid fa-file-invoice-dollar text-lg"></i><span>Iuran</span></button>
            <button id="n-giat" onclick="st('giat')" class="nav-btn"><i class="fa-solid fa-bullhorn text-lg"></i><span>Giat</span></button>
            <button id="n-master" onclick="st('master')" class="nav-btn"><i class="fa-solid fa-users-gear text-lg"></i><span>Master</span></button>
        </nav>
    </div>

    <script src="cp.js?v=1.3"></script>
</body>
</html>
