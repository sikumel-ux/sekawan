<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Monitoring Kas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-bottom: 90px; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #F1F5F9; min-width: 90px; }
        .table-scroll { overflow-x: auto; border-radius: 1.5rem; border: 1px solid #E2E8F0; background: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        nav button.active { color: #064E3B; }
        nav button.active span { background: #ECFDF5; border-radius: 12px; padding: 4px 12px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="mainApp" class="max-w-md mx-auto p-5">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-white">
                <span class="material-symbols-rounded">account_balance</span>
            </div>
            <div>
                <h1 class="text-xl font-black text-emerald-900 leading-none">Tuntas.</h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-widest">VIEWER MODE</p>
            </div>
        </div>
        <div class="text-right">
            <p id="currentDate" class="text-[10px] font-extrabold text-slate-500 uppercase"></p>
        </div>
    </header>

    <div class="space-y-4 mb-8">
        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden">
            <div class="relative z-10">
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Total Saldo Kas Saat Ini</p>
                <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-emerald-500 uppercase mb-1">Total Pemasukan</p>
                <p id="totalMasuk" class="text-lg font-black text-slate-800">Rp 0</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[9px] font-bold text-red-500 uppercase mb-1">Total Pengeluaran</p>
                <p id="totalKeluar" class="text-lg font-black text-slate-800">Rp 0</p>
            </div>
        </div>
    </div>

    <div id="screen-home" class="tab-content active space-y-4">
        <div class="flex justify-between items-center px-1">
            <h3 class="font-black text-xs text-slate-400 uppercase tracking-tighter">Riwayat Kas Terbaru</h3>
        </div>
        <div id="listRiwayat" class="space-y-3">
            </div>
    </div>

    <div id="screen-rekap" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase text-lg px-1">Laporan Iuran Warga</h3>
        <div class="table-scroll">
            <table class="w-full text-left text-[11px]">
                <thead><tr id="th-rekap" class="text-slate-400 uppercase font-black"><th class="sticky-col p-4 bg-white">Nama</th></tr></thead>
                <tbody id="tb-rekap"></tbody>
                <tfoot id="tf-rekap" class="bg-emerald-50 font-black text-emerald-900"></tfoot>
            </table>
        </div>
        <p class="text-[9px] text-slate-400 px-2 italic">* Satuan dalam ribuan (K)</p>
    </div>

    <div id="screen-warga" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase text-lg px-1">Daftar Warga</h3>
        <div id="tBodyWarga" class="grid grid-cols-1 gap-2">
            </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white/80 backdrop-blur-lg border-t border-slate-100 flex justify-around items-center px-6 z-50">
        <button onclick="st('home')" id="n-home" class="active flex flex-col items-center gap-1 transition-all">
            <span class="material-symbols-rounded">receipt_long</span>
            <span class="text-[9px] font-bold">HISTORI</span>
        </button>
        <button onclick="st('rekap')" id="n-rekap" class="flex flex-col items-center gap-1 transition-all">
            <span class="material-symbols-rounded">grid_view</span>
            <span class="text-[9px] font-bold">REKAP</span>
        </button>
        <button onclick="st('warga')" id="n-warga" class="flex flex-col items-center gap-1 transition-all">
            <span class="material-symbols-rounded">groups</span>
            <span class="text-[9px] font-bold">WARGA</span>
        </button>
    </nav>
</div>

<script>
    // Firebase Configuration (Same as yours)
    const config = {
        apiKey: "AIzaSyDjxOJZeiLHaxoaS3-hVdbIGfIXCfCT2Is",
        authDomain: "tuntas-sekawan.firebaseapp.com",
        projectId: "tuntas-sekawan",
        storageBucket: "tuntas-sekawan.firebasestorage.app",
        messagingSenderId: "1090506516563",
        appId: "1:1090506516563:web:63c429677caea28addfea6"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni"];

    function init() {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric'});
        
        const thr = document.getElementById('th-rekap');
        thr.innerHTML = '<th class="sticky-col p-4 bg-white">Nama</th>';
        daftarBulan.forEach(bln => {
            thr.innerHTML += `<th class="text-center p-3 font-bold text-slate-400">${bln.substring(0,3)}</th>`;
        });
        loadData();
    }

    async function loadData() {
        const [dkas, diur, dang] = await Promise.all([
            db.collection("kas").get(), 
            db.collection("pembayaran").get(), 
            db.collection("anggota").orderBy("nama","asc").get()
        ]);
        
        let tIn=0, tOut=0, tIur=0;
        let totalsBln = {}; daftarBulan.forEach(b => totalsBln[b] = 0);
        let allTrx = [];
        
        const ti=document.getElementById('tBodyWarga'), tr=document.getElementById('tb-rekap'), listR = document.getElementById('listRiwayat');
        ti.innerHTML=''; tr.innerHTML=''; listR.innerHTML='';
        const iuranArr = diur.docs.map(doc => ({id: doc.id, ...doc.data()}));

        dkas.docs.forEach(doc => {
            const d = doc.data(); const nom = Number(d.nom || 0);
            if(d.kat==='Masuk') tIn+=nom; else tOut+=nom;
            allTrx.push({ id: doc.id, ket: d.ket, nom: nom, kat: d.kat, tgl: d.tgl.toDate() });
        });

        iuranArr.forEach(d => {
            const nom = Number(d.nom || 0); tIur += nom;
            allTrx.push({ id: d.id, ket: `IURAN: ${(d.nama||'').split(' ')[0]}`, nom: nom, kat: 'Masuk', tgl: (d.tgl?d.tgl.toDate():new Date()) });
        });

        // Update Dashboard Cards
        document.getElementById('totalSaldo').innerText = 'Rp ' + ((tIn + tIur) - tOut).toLocaleString('id-ID');
        document.getElementById('totalMasuk').innerText = 'Rp ' + (tIn + tIur).toLocaleString('id-ID');
        document.getElementById('totalKeluar').innerText = 'Rp ' + tOut.toLocaleString('id-ID');

        // Render Histori (Limited to latest 20 for performance)
        allTrx.sort((a,b) => b.tgl - a.tgl);
        allTrx.forEach(tx => {
            const isM = tx.kat === 'Masuk';
            listR.insertAdjacentHTML('beforeend', `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm">
                    <div class="flex gap-3 items-center">
                        <div class="w-10 h-10 rounded-xl ${isM?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'} flex items-center justify-center">
                            <span class="material-symbols-rounded text-sm">${isM?'trending_up':'trending_down'}</span>
                        </div>
                        <div>
                            <p class="text-xs font-black uppercase tracking-tighter text-slate-700">${tx.ket}</p>
                            <p class="text-[8px] text-slate-400 font-bold">${tx.tgl.toLocaleDateString('id-ID')}</p>
                        </div>
                    </div>
                    <p class="font-black text-xs ${isM?'text-emerald-700':'text-red-600'}">${isM?'+':'-'} ${tx.nom.toLocaleString()}</p>
                </div>`);
        });

        // Render Rekap & Warga
        dang.docs.forEach(doc => {
            const d = doc.data(); const n = (d.nama || "").trim().toUpperCase();
            
            // Card Warga
            ti.insertAdjacentHTML('beforeend', `
                <div class="bg-white p-4 rounded-2xl flex items-center gap-4 border border-slate-100 shadow-sm">
                    <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 font-bold text-xs">${n.substring(0,1)}</div>
                    <div>
                        <p class="font-black text-xs uppercase text-slate-700">${n}</p>
                        <p class="text-[9px] text-slate-400 font-bold italic">Status: Aktif</p>
                    </div>
                </div>`);

            // Row Rekap
            let row = `<tr><td class="sticky-col p-4 font-bold text-slate-700 bg-white border-b border-slate-50 uppercase">${n.split(' ')[0]}</td>`;
            daftarBulan.forEach(bln => {
                const lunas = iuranArr.filter(k => (k.nama||"").toUpperCase() === n && (k.bulan||"").includes(bln));
                if(lunas.length > 0) {
                    let nomBln = 0; lunas.forEach(l => nomBln += (Number(l.nom) / (l.bulan||"").split(',').length));
                    row += `<td class="text-center text-emerald-600 font-black">${(nomBln/1000).toFixed(0)}K</td>`;
                    totalsBln[bln] += nomBln;
                } else { row += `<td class="text-center text-slate-200 font-bold">.</td>`; }
            });
            tr.insertAdjacentHTML('beforeend', row + `</tr>`);
        });

        let frow = `<tr><td class="sticky-col p-4 font-black bg-emerald-50 text-emerald-900 uppercase">TOTAL</td>`;
        daftarBulan.forEach(bln => frow += `<td class="text-center p-4 bg-emerald-50 text-emerald-800 font-black">${(totalsBln[bln]/1000).toFixed(0)}K</td>`);
        document.getElementById('tf-rekap').innerHTML = frow + `</tr>`;
    }

    function st(t) {
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('screen-' + t).classList.add('active');
        document.getElementById('n-' + t).classList.add('active');
    }

    init();
</script>
</body>
</html>
