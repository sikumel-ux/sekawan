<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS - Panel Admin Petugas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; padding-bottom: 90px; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 9999; display: none; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 14px; letter-spacing: 0.05em; }
        .active-tab-btn { color: #059669 !important; }
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 300; opacity: 0; transition: all 0.25s ease-out; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { background: white; width: 90%; max-width: 400px; padding: 24px; border-radius: 2rem; transform: scale(0.9); transition: all 0.25s ease-out; }
        .modal.active .modal-content { transform: scale(1); }
        #listStatusSampahHariIni::-webkit-scrollbar { width: 4px; }
        #listStatusSampahHariIni::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div id="loadingAdmin" class="loading-overlay">Memproses Akses Pengurus...</div>

<div id="adminAlert" class="modal">
    <div class="modal-content text-center space-y-4">
        <div id="alertIconBox" class="w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-emerald-50 text-emerald-600">
            <span class="material-symbols-rounded">check_circle</span>
        </div>
        <h4 id="alertAdminTitle" class="font-black text-slate-800 uppercase text-sm"></h4>
        <p id="alertAdminMsg" class="text-xs font-semibold text-slate-500 leading-relaxed"></p>
        <button onclick="closeAdminAlert()" class="w-full bg-slate-900 text-white p-3 rounded-xl font-black uppercase text-xs tracking-wider">Oke</button>
    </div>
</div>

<div id="screen-login-admin" class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-6">
    <div class="flex-1 flex flex-col justify-center w-full my-auto">
        <div class="space-y-6 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm text-center">
            <div>
                <span class="material-symbols-rounded text-emerald-800 !text-5xl">admin_panel_settings</span>
                <h2 class="text-xl font-black text-slate-900 tracking-tight uppercase mt-2">LOGIN PETUGAS</h2>
                
            </div>
            
            <div class="space-y-3 text-left">
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Username</label>
                    <input type="text" id="admNama" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600 mt-1" placeholder="admin">
                </div>
                <div>
                    <label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Password</label>
                    <input type="text" id="admHp" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600 mt-1" placeholder="Apri">
                </div>
            </div>
            <button onclick="prosesLoginAdmin()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black uppercase text-xs shadow-lg tracking-wider active:scale-95 transition-all">Verifikasi Petugas</button>
        </div>
    </div>
</div>

<div id="screen-dashboard-admin" class="max-w-md mx-auto p-5 space-y-5 hidden">
    <header class="flex justify-between items-center bg-white p-3 px-4 rounded-2xl border border-slate-100 shadow-2xs">
        <div class="flex items-center gap-2">
            <span class="material-symbols-rounded text-emerald-700">shield_person</span>
            <h1 class="text-xs font-black text-slate-800 tracking-tight uppercase">ADMIN TUNTAS</h1>
        </div>
        <p id="namaPetugasText" class="text-xs font-black text-emerald-700 uppercase">-</p>
    </header>

    <div id="tab-admin-sampah" class="tab-admin-content space-y-4">
        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <div>
                    <h3 class="font-black text-xs text-slate-800 uppercase tracking-tight">Input Absen Sampah</h3>
                    <p id="infoTanggalHariIni" class="text-[9px] font-bold text-slate-400 mt-0.5">Hari ini: -</p>
                </div>
                <span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 rounded-md text-[8px] font-black uppercase">Real-Time</span>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Pilih Rumah / Warga</label>
                <select id="admPilihWarga" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600"></select>
            </div>
            <div class="space-y-2 pt-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Setel Status Hari Ini</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="adminSetelSampah('Diambil')" class="py-3 bg-emerald-600 text-white rounded-xl text-[10px] font-black uppercase tracking-wide shadow-sm active:scale-95 transition-all">Diambil</button>
                    <button onclick="adminSetelSampah('Tidak Diambil')" class="py-3 bg-rose-500 text-white rounded-xl text-[10px] font-black uppercase tracking-wide shadow-sm active:scale-95 transition-all">Lewat</button>
                    <button onclick="adminSetelSampah('Kosong')" class="py-3 bg-slate-400 text-white rounded-xl text-[10px] font-black uppercase tracking-wide shadow-sm active:scale-95 transition-all">Reset</button>
                </div>
            </div>
        </div>
        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-3">
            <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Log Angkutan Sampah Hari Ini</p>
            <div id="listStatusSampahHariIni" class="divide-y divide-slate-50 max-h-[40vh] overflow-y-auto pr-1"></div>
        </div>
    </div>

    <div id="tab-admin-kas" class="tab-admin-content space-y-4 hidden">
        <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
            <h3 class="font-black text-xs text-slate-800 uppercase tracking-tight border-b border-slate-50 pb-2">Catat Setoran Iuran Warga</h3>
            <p class="text-[10px] font-semibold text-amber-700 bg-amber-50 p-3 rounded-xl border border-amber-200">
                <i class="fa-solid fa-circle-info mr-1"></i> Data iuran langsung tersimpan ke Google Sheets utama.
            </p>
            <div class="space-y-3">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Warga Penyetor</label>
                    <select id="kasPilihWarga" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600 mt-1"></select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Keterangan Bulan</label>
                    <input type="text" id="kasKeterangan" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600 mt-1" placeholder="Contoh: Mei 2026">
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Nominal Iuran (Rp)</label>
                    <input type="number" id="kasNominal" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-600 mt-1" value="20000">
                </div>
            </div>
            <button onclick="prosesSubmitIuranBaru()" class="w-full bg-emerald-900 text-white p-3.5 rounded-xl font-black uppercase text-xs tracking-wider shadow-md active:scale-95 transition-all">Simpan Transaksi</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-xl px-4 py-2.5 z-50">
        <div class="max-w-md mx-auto grid grid-cols-3 text-center">
            <button onclick="switchTabAdmin('tab-admin-sampah', this)" class="flex flex-col items-center justify-center gap-0.5 text-slate-400 active-tab-btn focus:outline-none">
                <span class="material-symbols-rounded">delete_history</span>
                <span class="text-[9px] font-black uppercase tracking-tight">Kontrol Sampah</span>
            </button>
            <button onclick="switchTabAdmin('tab-admin-kas', this)" class="flex flex-col items-center justify-center gap-0.5 text-slate-400 focus:outline-none">
                <span class="material-symbols-rounded">add_card</span>
                <span class="text-[9px] font-black uppercase tracking-tight">Input Iuran</span>
            </button>
            <button onclick="logoutAdmin()" class="flex flex-col items-center justify-center gap-0.5 text-rose-400 focus:outline-none">
                <span class="material-symbols-rounded">power_settings_new</span>
                <span class="text-[9px] font-black uppercase tracking-tight">Keluar</span>
            </button>
        </div>
    </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHXqxr7jh3BrRlYqLrIn-fqT0ys9AnRBU",
    authDomain: "tuntas04.firebaseapp.com",
    databaseURL: "https://tuntas04-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tuntas04",
    storageBucket: "tuntas04.firebasestorage.app",
    messagingSenderId: "208840175808",
    appId: "1:208840175808:web:2ad07fdb8930845fbdbd25"
};

firebase.initializeApp(firebaseConfig);
const dbFirebase = firebase.database();

// LINK KODE BARU KAMU SUDAH LANGSUNG AKU PASANG DI SINI, BRO:
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZBn4bxYcPiXwT8LD1F15usZQESIWWFwxczEVLfnB7oWwl9FYbw8sAMwnORd2tNnuvLQ/exec";

const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
let dbGlobalAdmin = { anggota: [] };
let sessionAdmin = null;

function showAdminLoading() { document.getElementById('loadingAdmin').style.display = 'flex'; }
function hideAdminLoading() { document.getElementById('loadingAdmin').style.display = 'none'; }

function tampilAdminAlert(title, msg, isSuccess = true) {
    document.getElementById('alertAdminTitle').innerText = title;
    document.getElementById('alertAdminMsg').innerText = msg;
    const iconBox = document.getElementById('alertIconBox');
    if(isSuccess) {
        iconBox.className = "w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-emerald-50 text-emerald-600";
        iconBox.innerHTML = '<span class="material-symbols-rounded">check_circle</span>';
    } else {
        iconBox.className = "w-12 h-12 mx-auto rounded-full flex items-center justify-center bg-red-50 text-red-600";
        iconBox.innerHTML = '<span class="material-symbols-rounded">cancel</span>';
    }
    document.getElementById('adminAlert').classList.add('active');
}
function closeAdminAlert() { document.getElementById('adminAlert').classList.remove('active'); }

function switchTabAdmin(tabId, btnElement) {
    const tabs = document.querySelectorAll('.tab-admin-content');
    tabs.forEach(t => t.classList.add('hidden'));
    document.getElementById(tabId).classList.remove('hidden');
    const navButtons = document.querySelectorAll('nav button');
    navButtons.forEach(btn => btn.classList.remove('active-tab-btn'));
    if(btnElement) btnElement.classList.add('active-tab-btn');
}

// PROSES LOGIN MENEMBAK API ACTION loginAdmin
async function prosesLoginAdmin() {
    const inputNama = document.getElementById('admNama').value.trim();
    const inputHp = document.getElementById('admHp').value.trim();

    if(!inputNama || !inputHp) { 
        tampilAdminAlert("Gagal", "Nama dan No HP wajib diisi, bro!", false); 
        return; 
    }

    showAdminLoading();
    
    try {
        let urlTarget = `${SCRIPT_URL}?action=loginAdmin&nama=${encodeURIComponent(inputNama)}&hp=${encodeURIComponent(inputHp)}`;
        let res = await fetch(urlTarget, { method: "GET", mode: "cors" });
        let json = await res.json();
        
        hideAdminLoading();
        
        if(json.status === "success") {
            sessionAdmin = json.petugas;
            dbGlobalAdmin.anggota = json.anggota;
            bukaDashboardAdmin();
        } else {
            tampilAdminAlert("Ditolak", json.message || "Identitas salah.", false);
        }
    } catch(e) {
        console.error(e);
        hideAdminLoading();
        tampilAdminAlert("Koneksi Mampet", "Gagal fetch Apps Script. Pastikan setelan deployment 'Anyone' dan 'Execute as: Me' sudah benar.", false);
    }
}

function bukaDashboardAdmin() {
    document.getElementById('screen-login-admin').classList.add('hidden');
    document.getElementById('screen-dashboard-admin').classList.remove('hidden');
    document.getElementById('namaPetugasText').innerText = sessionAdmin.nama.toUpperCase();
    switchTabAdmin('tab-admin-sampah', document.querySelectorAll('nav button')[0]);
    
    const sekarang = new Date();
    document.getElementById('infoTanggalHariIni').innerText = `Hari Ini: ${sekarang.getDate()} ${daftarBulan[sekarang.getMonth()]} ${sekarang.getFullYear()}`;
    
    const selSampah = document.getElementById('admPilihWarga');
    const selKas = document.getElementById('kasPilihWarga');
    selSampah.innerHTML = ''; selKas.innerHTML = '';
    
    // Dropdown langsung diisi dari list anggota hasil kiriman API
    dbGlobalAdmin.anggota.forEach(w => {
        let opt = `<option value="${w.hp || w.nohp}">${w.nama.toUpperCase()} (${w.hp || w.nohp})</option>`;
        selSampah.insertAdjacentHTML('beforeend', opt);
        selKas.insertAdjacentHTML('beforeend', opt);
    });
    
    dengarStatusSampahHariIni();
}

function dengarStatusSampahHariIni() {
    const sekarang = new Date();
    const tglHariIni = sekarang.getDate();
    const thnBlnNode = `${sekarang.getFullYear()}-${String(sekarang.getMonth() + 1).padStart(2, '0')}`;
    
    dbFirebase.ref(`status_sampah`).on('value', (snapshot) => {
        const rootSampah = snapshot.val() || {};
        const listContainer = document.getElementById('listStatusSampahHariIni');
        listContainer.innerHTML = '';
        
        dbGlobalAdmin.anggota.forEach(w => {
            let statusWarga = "Belum Diabsen";
            let jamWaktu = "-";
            let warnaBadge = "bg-slate-100 text-slate-500";
            const userHp = w.hp || w.nohp;
            
            if(rootSampah[userHp] && rootSampah[userHp][thnBlnNode] && rootSampah[userHp][thnBlnNode][tglHariIni]) {
                const dataHariIni = rootSampah[userHp][thnBlnNode][tglHariIni];
                statusWarga = dataHariIni.status || "Kosong";
                jamWaktu = dataHariIni.waktu || "-";
                if(statusWarga === "Diambil") warnaBadge = "bg-emerald-100 text-emerald-700 font-bold";
                else if(statusWarga === "Tidak Diambil") warnaBadge = "bg-rose-100 text-rose-700 font-bold";
            }
            listContainer.insertAdjacentHTML('beforeend', `
                <div class="py-3 flex justify-between items-center text-xs">
                    <div>
                        <p class="font-black text-slate-700 uppercase leading-none">${w.nama}</p>
                        <p class="text-[9px] text-slate-400 font-semibold mt-1">Waktu: ${jamWaktu}</p>
                    </div>
                    <span class="px-2.5 py-1 rounded-lg text-[9px] uppercase tracking-wider ${warnaBadge}">${statusWarga}</span>
                </div>
            `);
        });
    });
}

function adminSetelSampah(statusPilihan) {
    const hpTarget = document.getElementById('admPilihWarga').value;
    if(!hpTarget) return;
    showAdminLoading();
    const sekarang = new Date();
    const tglHariIni = sekarang.getDate();
    const thnBlnNode = `${sekarang.getFullYear()}-${String(sekarang.getMonth() + 1).padStart(2, '0')}`;
    const jamMenit = sekarang.toTimeString().split(' ')[0].substring(0, 5);
    const teksWaktu = `${jamMenit} WIB`;
    const targetNode = dbFirebase.ref(`status_sampah/${hpTarget}/${thnBlnNode}/${tglHariIni}`);
    
    if (statusPilihan === "Kosong") {
        targetNode.remove().then(() => { hideAdminLoading(); tampilAdminAlert("Sukses", "Data status direset.", true); });
    } else {
        targetNode.update({ status: statusPilihan, waktu: teksWaktu }).then(() => { hideAdminLoading(); tampilAdminAlert("Berhasil", "Absen diperbarui.", true); });
    }
}

async function prosesSubmitIuranBaru() {
    const hpTarget = document.getElementById('kasPilihWarga').value;
    const wargaObj = dbGlobalAdmin.anggota.find(u => (u.hp || u.nohp) == hpTarget);
    const nominal = document.getElementById('kasNominal').value.trim();
    const keterangan = document.getElementById('kasKeterangan').value.trim();
    if(!nominal || !keterangan) { tampilAdminAlert("Gagal", "Nominal & Keterangan Bulan wajib diisi!", false); return; }
    
    showAdminLoading();
    const params = new URLSearchParams();
    params.append('action', 'addPembayaran');
    params.append('nama', wargaObj.nama);
    params.append('nominal', nominal);
    params.append('keterangan', keterangan);
    
    try {
        let res = await fetch(SCRIPT_URL, { method: 'POST', mode: 'cors', body: params, headers: { 'Content-Type': 'application/x-www-form-urlencoded' } });
        let json = await res.json();
        hideAdminLoading();
        if(json.status === 'success') { document.getElementById('kasKeterangan').value = ''; tampilAdminAlert("Transaksi Sukses", "Data disimpan!", true); }
        else { tampilAdminAlert("Gagal", "Gagal menyimpan ke Sheets.", false); }
    } catch(e) { hideAdminLoading(); tampilAdminAlert("Koneksi Putus", "Gagal mengirim data.", false); }
}

function logoutAdmin() {
    sessionAdmin = null; dbFirebase.ref(`status_sampah`).off();
    document.getElementById('screen-dashboard-admin').classList.add('hidden');
    document.getElementById('screen-login-admin').classList.remove('hidden');
    document.getElementById('admNama').value = ''; document.getElementById('admHp').value = '';
}
</script>
</body>
</html>
