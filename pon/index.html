<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PON</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link rel="stylesheet" href="pon-style.css">
</head>
<body class="max-w-md mx-auto">

    <main class="p-5">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-orange-500 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-200">
                    <span class="material-symbols-rounded text-3xl">menu_book</span>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 leading-none tracking-tighter uppercase">PON Mandiri</h1>
                    <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest mt-1">Buku Kas Terpisah</p>
                </div>
            </div>
            <button onclick="window.history.back()" class="w-10 h-10 bg-white border border-slate-100 rounded-xl flex items-center justify-center text-slate-400 shadow-sm active:scale-90 transition-all">
                <span class="material-symbols-rounded">close</span>
            </button>
        </header>

        <div class="card-gradient p-8 rounded-[2.5rem] text-white mb-6 relative overflow-hidden shadow-2xl">
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest text-orange-400">Total Saldo PON</p>
            <h2 id="totalPon" class="text-4xl font-black mt-2 tracking-tight">Rp 0</h2>
            <span class="material-symbols-rounded absolute -right-4 -bottom-4 text-8xl opacity-10">account_balance_wallet</span>
        </div>

        <section class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm space-y-4 mb-8">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="label-custom">Tanggal</label>
                    <input type="date" id="pTgl" class="modern-in">
                </div>
                <div class="space-y-1">
                    <label class="label-custom">Kategori</label>
                    <select id="pKat" class="modern-in">
                        <option value="Masuk">Masuk (+)</option>
                        <option value="Keluar">Keluar (-)</option>
                    </select>
                </div>
            </div>
            <div class="space-y-1">
                <label class="label-custom">Keterangan</label>
                <input type="text" id="pKet" class="modern-in uppercase" placeholder="CONTOH: DANA SOSIAL">
            </div>
            <div class="space-y-1">
                <label class="label-custom">Nominal Rp</label>
                <input type="number" id="pNom" class="modern-in text-lg font-black text-orange-600" placeholder="0">
            </div>
            <button onclick="simpanPon()" class="btn-primary">Simpan Transaksi</button>
        </section>

        <div class="space-y-4 pb-12">
            <div class="flex justify-between items-center px-1">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Riwayat Transaksi</h3>
                <span id="countData" class="text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-1 rounded-full uppercase">0 Data</span>
            </div>
            <div id="listPon" class="space-y-3">
                </div>
        </div>
    </main>

    <div id="modalEdit" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center p-6 z-[100] backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 space-y-5 shadow-2xl scale-in">
            <div class="text-center">
                <h3 class="font-black text-slate-800 uppercase text-lg">Edit Transaksi</h3>
                <p class="text-[10px] text-slate-400 font-bold uppercase">Ubah rincian kas PON</p>
            </div>
            <input type="hidden" id="editId">
            <div class="space-y-3">
                <input type="date" id="eTgl" class="modern-in">
                <select id="eKat" class="modern-in">
                    <option value="Masuk">Masuk (+)</option>
                    <option value="Keluar">Keluar (-)</option>
                </select>
                <input type="text" id="eKet" class="modern-in uppercase" placeholder="KETERANGAN">
                <input type="number" id="eNom" class="modern-in font-black text-orange-600" placeholder="NOMINAL">
            </div>
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="closeModal()" class="p-4 rounded-2xl bg-slate-100 font-bold text-[11px] uppercase text-slate-400">Batal</button>
                <button onclick="updatePon()" class="p-4 rounded-2xl bg-orange-600 text-white font-bold text-[11px] uppercase">Update</button>
            </div>
        </div>
    </div>

    <script src="pon-script.js"></script>
</body>
</html>
