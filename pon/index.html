<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUNTAS ADMIN - ALL IN ONE</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F8FAFC; padding-bottom: 120px; }
        .modern-in { width: 100%; padding: 14px; background: #F1F5F9; border: 1px solid #E2E8F0; border-radius: 1rem; outline: none; font-size: 13px; font-weight: 600; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Table Rekap Styles */
        .table-scroll { overflow-x: auto; border-radius: 1.5rem; border: 1px solid #E2E8F0; background: white; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #F1F5F9; min-width: 120px; }
        
        /* Navigation */
        nav button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94A3B8; transition: 0.3s; }
        nav button.active { color: #064E3B; font-weight: 800; }
        nav button#n-pon.active { color: #EA580C; }
        
        .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: none; }
        .modal-overlay.flex { display: flex; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto p-5">
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-white shadow-lg">
                <span class="material-symbols-rounded">wallet</span>
            </div>
            <h1 class="text-xl font-black text-emerald-900 uppercase tracking-tighter">Tuntas.</h1>
        </div>
    </header>

    <div id="screen-home" class="tab-content active space-y-4">
        <div class="p-8 bg-emerald-900 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
            <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Saldo Kas Utama</p>
            <h2 id="totalSaldo" class="text-4xl font-black mt-1">Rp 0</h2>
            <div class="flex gap-4 mt-4 pt-4 border-t border-white/10">
                <div><p class="text-[8px] opacity-50 uppercase">Masuk</p><p id="tMasuk" class="text-xs font-bold text-emerald-400">Rp 0</p></div>
                <div><p class="text-[8px] opacity-50 uppercase">Keluar</p><p id="tKeluar" class="text-xs font-bold text-red-400">Rp 0</p></div>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <button onclick="st('bayar')" class="bg-white p-4 rounded-3xl border flex flex-col items-center gap-1 font-black text-[10px] text-slate-600 uppercase shadow-sm">
                <span class="material-symbols-rounded text-emerald-600">payments</span>Iuran
            </button>
            <button onclick="openModal('mKas')" class="bg-white p-4 rounded-3xl border flex flex-col items-center gap-1 font-black text-[10px] text-slate-600 uppercase shadow-sm">
                <span class="material-symbols-rounded text-emerald-900">add_card</span>Kas Umum
            </button>
        </div>
        <div class="pt-2">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest px-1">6 Transaksi Terakhir</h3>
            <div id="listRiwayat" class="space-y-2"></div>
        </div>
    </div>

    <div id="screen-warga" class="tab-content space-y-4">
        <div class="flex justify-between items-center px-1">
            <h3 class="font-black text-emerald-900 uppercase">Daftar Warga</h3>
            <button onclick="openModal('mAnggota')" class="bg-emerald-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">+ Tambah Warga</button>
        </div>
        <div id="tBodyWarga" class="space-y-2"></div>
    </div>

    <div id="screen-rekap" class="tab-content space-y-4">
        <h3 class="font-black text-emerald-900 uppercase px-1">Rekap Iuran</h3>
        <div class="table-scroll">
            <table class="w-full text-[10px] text-left">
                <thead><tr id="th-rekap" class="text-slate-400 uppercase border-b"></tr></thead>
                <tbody id="tb-rekap"></tbody>
            </table>
        </div>
    </div>

    <div id="screen-bayar" class="tab-content space-y-4">
        <div class="bg-white p-6 rounded-[2.5rem] border shadow-sm space-y-4">
            <h3 class="font-black text-center text-emerald-900 uppercase">Input Pembayaran</h3>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Tanggal Bayar</label>
                <input type="date" id="iTgl" class="modern-in">
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Nama Warga</label>
                <select id="iNama" class="modern-in font-bold uppercase"></select>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Pilih Bulan</label>
                <div id="gridBulan" class="grid grid-cols-3 gap-2"></div>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Nominal</label>
                <input type="number" id="iNom" class="modern-in text-center text-xl font-black" placeholder="RP 0">
            </div>
            <button onclick="simpanIuran()" class="w-full bg-emerald-900 text-white p-4 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition-all">Simpan & Cetak Kuitansi</button>
        </div>
    </div>

    <div id="screen-pon" class="tab-content space-y-4">
        <div class="bg-slate-900 p-7 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
            <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Saldo PON Mandiri</p>
            <h2 id="totalPon" class="text-3xl font-black text-orange-400 mt-1">Rp 0</h2>
            <span class="material-symbols-rounded absolute -right-2 -bottom-2 text-7xl opacity-10">menu_book</span>
        </div>
        <div class="bg-white p-6 rounded-[2.5rem] border border-orange-100 shadow-sm space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="pTgl" class="modern-in">
                <select id="pKat" class="modern-in"><option value="Masuk">MASUK (+)</option><option value="Keluar">KELUAR (-)</option></select>
            </div>
            <input type="text" id="pKet" class="modern-in uppercase" placeholder="KETERANGAN (CONTOH: TITIPAN)">
            <input type="number" id="pNom" class="modern-in font-black text-lg" placeholder="RP 0">
            <button onclick="simpanPon()" class="w-full bg-orange-600 text-white p-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Simpan Transaksi PON</button>
        </div>
        <div id="listPon" class="space-y-2 pb-10"></div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 h-20 bg-white border-t flex justify-around items-center px-1 z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="st('home')" id="n-home" class="active"><span class="material-symbols-rounded">home</span><span class="text-[8px] font-bold">HOME</span></button>
        <button onclick="st('warga')" id="n-warga"><span class="material-symbols-rounded">group</span><span class="text-[8px] font-bold">WARGA</span></button>
        <button onclick="st('pon')" id="n-pon">
            <div class="w-10 h-10 bg-orange-100 rounded-full flex items-center justify-center text-orange-600 mb-1">
                <span class="material-symbols-rounded">menu_book</span>
            </div>
            <span class="text-[8px] font-black text-orange-600">PON</span>
        </button>
        <button onclick="st('rekap')" id="n-rekap"><span class="material-symbols-rounded">analytics</span><span class="text-[8px] font-bold">REKAP</span></button>
        <button onclick="st('bayar')" id="n-bayar"><span class="material-symbols-rounded">payments</span><span class="text-[8px] font-bold">BAYAR</span></button>
    </nav>
</div>

<div id="mKas" class="modal-overlay fixed inset-0 items-center justify-center p-6 z-[100]" onclick="if(event.target==this)closeModal('mKas')">
    <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-sm space-y-4 shadow-2xl">
        <h3 class="font-black text-center uppercase text-emerald-900 tracking-widest">Catat Kas Umum</h3>
        <input type="date" id="kTgl" class="modern-in">
        <select id="kKat" class="modern-in"><option value="Masuk">MASUK (+)</option><option value="Keluar">KELUAR (-)</option></select>
        <input type="text" id="kKet" class="modern-in uppercase" placeholder="KETERANGAN">
        <input type="number" id="kNom" class="modern-in font-black" placeholder="NOMINAL RP">
        <button onclick="simpanKas()" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black uppercase text-xs">Simpan Data</button>
    </div>
</div>

<div id="mAnggota" class="modal-overlay fixed inset-0 items-center justify-center p-6 z-[100]" onclick="if(event.target==this)closeModal('mAnggota')">
    <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-sm space-y-4 shadow-2xl">
        <h3 class="font-black text-center uppercase text-emerald-900 tracking-widest">Tambah Warga</h3>
        <input type="text" id="aNama" class="modern-in uppercase" placeholder="NAMA LENGKAP">
        <input type="number" id="aHp" class="modern-in" placeholder="WHATSAPP (628...)">
        <button onclick="simpanAnggota()" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black uppercase text-xs">Simpan Warga</button>
    </div>
</div>

<div id="mKuitansi" class="modal-overlay fixed inset-0 items-center justify-center p-6 z-[200]">
    <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm border-4 border-emerald-900 relative shadow-2xl">
        <div class="text-center border-b-2 border-dashed pb-4 mb-4">
            <h2 class="font-black text-emerald-900 text-xl italic uppercase">Kuitansi</h2>
            <p class="text-[9px] font-bold text-slate-400" id="kui-tgl"></p>
        </div>
        <div class="space-y-3 text-xs">
            <div class="flex flex-col"><span class="text-slate-400 text-[10px] uppercase font-bold">Sudah terima dari:</span><span id="kui-nama" class="font-black text-sm uppercase text-slate-800"></span></div>
            <div class="flex flex-col"><span class="text-slate-400 text-[10px] uppercase font-bold">Guna membayar:</span><span id="kui-bln" class="font-bold text-slate-700"></span></div>
            <div class="bg-emerald-50 p-4 rounded-2xl flex justify-between items-center mt-6 border border-emerald-100">
                <span class="font-black text-emerald-900 uppercase">Jumlah:</span>
                <span id="kui-nom" class="text-xl font-black text-emerald-700"></span>
            </div>
        </div>
        <button onclick="closeModal('mKuitansi')" class="mt-8 w-full bg-slate-900 text-white p-4 rounded-2xl font-black text-xs uppercase tracking-widest">Tutup & Selesai</button>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const config = {
        apiKey: "AIzaSyDjxOJZeiLHaxoaS3-hVdbIGfIXCfCT2Is",
        authDomain: "tuntas-sekawan.firebaseapp.com",
        projectId: "tuntas-sekawan",
        storageBucket: "tuntas-sekawan.firebasestorage.app",
        messagingSenderId: "1090506516563",
        appId: "1:1090506516563:web:63c429677caea28addfea6"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    const daftarBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni"];

    // --- INITIALIZE ---
    document.addEventListener('DOMContentLoaded', () => {
        setupUI();
        loadData();
        loadPon();
    });

    function setupUI() {
        const grid = document.getElementById('gridBulan');
        const thr = document.getElementById('th-rekap');
        const today = new Date().toISOString().split('T')[0];
        
        document.getElementById('iTgl').value = today;
        document.getElementById('kTgl').value = today;
        document.getElementById('pTgl').value = today;

        thr.innerHTML = '<th class="sticky-col p-4 bg-white shadow-sm font-black text-slate-800">WARGA</th>';
        grid.innerHTML = '';
        daftarBulan.forEach(bln => {
            grid.innerHTML += `
                <label class="relative">
                    <input type="checkbox" name="blnCek" value="${bln}" class="hidden peer">
                    <div class="cursor-pointer text-[8px] font-black py-3 text-center border rounded-xl bg-white text-slate-300 peer-checked:bg-emerald-900 peer-checked:text-white uppercase transition-all">
                        ${bln.substring(0,3)}
                    </div>
                </label>`;
            thr.innerHTML += `<th class="p-3 text-center text-slate-400 font-bold">${bln.substring(0,3)}</th>`;
        });
    }

    // --- LOGIKA KAS UTAMA ---
    async function loadData() {
        const [dkas, diur, dang] = await Promise.all([
            db.collection("kas").get(), 
            db.collection("pembayaran").get(), 
            db.collection("anggota").orderBy("nama","asc").get()
        ]);

        let tIn=0, tOut=0, tIur=0, allTrx = [];
        const ti=document.getElementById('tBodyWarga'), tr=document.getElementById('tb-rekap'), sel=document.getElementById('iNama'), listR = document.getElementById('listRiwayat');
        
        ti.innerHTML=''; tr.innerHTML=''; sel.innerHTML='<option value="">PILIH WARGA</option>'; listR.innerHTML='';
        const iuranArr = diur.docs.map(doc => ({...doc.data()}));

        dkas.docs.forEach(doc => {
            const d = doc.data(); const n = Number(d.nom || 0);
            if(d.kat==='Masuk') tIn+=n; else tOut+=n;
            allTrx.push({ ket: d.ket, nom: n, kat: d.kat, tgl: d.tgl.toDate() });
        });

        iuranArr.forEach(d => {
            const n = Number(d.nom || 0); tIur += n;
            allTrx.push({ ket: `IURAN: ${d.nama}`, nom: n, kat: 'Masuk', tgl: d.tgl ? d.tgl.toDate() : new Date() });
        });

        document.getElementById('totalSaldo').innerText = 'Rp ' + ((tIn + tIur) - tOut).toLocaleString('id-ID');
        document.getElementById('tMasuk').innerText = 'Rp ' + (tIn + tIur).toLocaleString('id-ID');
        document.getElementById('tKeluar').innerText = 'Rp ' + tOut.toLocaleString('id-ID');

        allTrx.sort((a,b) => b.tgl - a.tgl).slice(0, 6).forEach(tx => {
            const isM = tx.kat === 'Masuk';
            listR.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm"><div class="flex gap-3 items-center"><div class="w-8 h-8 rounded-lg ${isM?'bg-emerald-50 text-emerald-600':'bg-red-50 text-red-600'} flex items-center justify-center font-black text-[9px]">${isM?'IN':'OUT'}</div><div><p class="text-[10px] font-black uppercase text-slate-700 leading-tight">${tx.ket}</p><p class="text-[8px] text-slate-300 font-bold">${tx.tgl.toLocaleDateString('id-ID')}</p></div></div><p class="font-black text-xs ${isM?'text-emerald-700':'text-red-600'}">${isM?'+':'-'} ${tx.nom.toLocaleString()}</p></div>`);
        });

        dang.docs.forEach(doc => {
            const d = doc.data(); const n = d.nama.toUpperCase();
            sel.insertAdjacentHTML('beforeend', `<option value="${n}">${n}</option>`);
            ti.insertAdjacentHTML('beforeend', `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm"><p class="font-black text-[11px] text-slate-700 uppercase">${n}</p><button onclick="hapus('anggota','${doc.id}')" class="text-slate-200 hover:text-red-600"><span class="material-symbols-rounded">delete</span></button></div>`);

            let row = `<tr><td class="sticky-col p-4 font-black text-slate-700 border-b uppercase text-[9px]">${n}</td>`;
            daftarBulan.forEach(bln => {
                const lunas = iuranArr.filter(k => k.nama === n && k.bulan.includes(bln));
                row += `<td class="text-center p-3 border-b ${lunas.length>0?'text-emerald-600 font-black':'text-slate-100'}">${lunas.length>0?'LUNAS':'-'}</td>`;
            });
            tr.insertAdjacentHTML('beforeend', row + `</tr>`);
        });
    }

    async function simpanIuran() {
        const tgl = document.getElementById('iTgl').value, nama = document.getElementById('iNama').value, nom = Number(document.getElementById('iNom').value);
        const ceks = Array.from(document.querySelectorAll('input[name="blnCek"]:checked')).map(c => c.value);
        if(!nama || !nom || ceks.length === 0) return alert("Lengkapi data pembayaran!");
        
        const blns = ceks.join(', ');
        await db.collection("pembayaran").add({ nama, nom, bulan: blns, tgl: new Date(tgl) });
        
        // Setup Kuitansi
        document.getElementById('kui-nama').innerText = nama;
        document.getElementById('kui-bln').innerText = blns;
        document.getElementById('kui-nom').innerText = 'Rp ' + nom.toLocaleString();
        document.getElementById('kui-tgl').innerText = new Date(tgl).toLocaleDateString('id-ID', {dateStyle:'full'});
        openModal('mKuitansi');

        // Reset
        document.querySelectorAll('input[name="blnCek"]').forEach(c => c.checked = false);
        document.getElementById('iNom').value = ''; 
        loadData();
    }

    async function simpanAnggota() {
        const nama = document.getElementById('aNama').value.trim().toUpperCase(), hp = document.getElementById('aHp').value;
        if(!nama) return alert("Nama wajib diisi!");
        await db.collection("anggota").add({ nama, hp });
        document.getElementById('aNama').value = ''; 
        closeModal('mAnggota'); 
        loadData();
    }

    async function simpanKas() {
        const tgl = document.getElementById('kTgl').value, kat = document.getElementById('kKat').value, ket = document.getElementById('kKet').value.trim().toUpperCase(), nom = Number(document.getElementById('kNom').value);
        if(!ket || !nom) return alert("Lengkapi data kas!");
        await db.collection("kas").add({ tgl: new Date(tgl), kat, ket, nom });
        closeModal('mKas'); 
        loadData();
    }

    // --- LOGIKA PON MANDIRI ---
    async function simpanPon() {
        const tgl = document.getElementById('pTgl').value, kat = document.getElementById('pKat').value, ket = document.getElementById('pKet').value.trim().toUpperCase(), nom = Number(document.getElementById('pNom').value);
        if(!ket || !nom) return alert("Lengkapi data PON!");
        await db.collection("pon_mandiri").add({ tgl: new Date(tgl), kat, ket, nom });
        document.getElementById('pKet').value = ''; 
        document.getElementById('pNom').value = ''; 
        loadPon();
    }

    async function loadPon() {
        const snap = await db.collection("pon_mandiri").orderBy("tgl", "desc").get();
        const list = document.getElementBy
