<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PON Tuntas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="pon-style.css">
</head>
<body class="max-w-md mx-auto">

    <main class="p-5">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-orange-100">
                    <span class="material-symbols-rounded text-3xl">menu_book</span>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-800 leading-none">PON MANDIRI</h1>
                    <p class="text-[9px] font-bold text-orange-600 uppercase tracking-widest mt-1">Buku Kas Terpisah</p>
                </div>
            </div>
            <a href="index.html" class="w-10 h-10 border rounded-xl flex items-center justify-center text-slate-400">
                <span class="material-symbols-rounded">close</span>
            </a>
        </header>

        <div class="bg-slate-900 p-8 rounded-[2.5rem] text-white mb-6 card-shadow relative overflow-hidden">
            <p class="text-[10px] font-bold opacity-50 uppercase tracking-widest">Sisa Saldo PON</p>
            <h2 id="totalPon" class="text-4xl font-black text-orange-400 mt-1">Rp 0</h2>
            <span class="material-symbols-rounded absolute -right-4 -bottom-4 text-8xl opacity-10">payments</span>
        </div>

        <section class="bg-white p-6 rounded-[2.5rem] border border-orange-50 shadow-sm space-y-4 mb-8">
            <div class="grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="label-custom">Tanggal</label>
                    <input type="date" id="pTgl" class="modern-in">
                </div>
                <div class="space-y-1">
                    <label class="label-custom">Jenis</label>
                    <select id="pKat" class="modern-in">
                        <option value="Masuk">Masuk (+)</option>
                        <option value="Keluar">Keluar (-)</option>
                    </select>
                </div>
            </div>
            <div class="space-y-1">
                <label class="label-custom">Keterangan</label>
                <input type="text" id="pKet" class="modern-in uppercase" placeholder="Fufufafa">
            </div>
            <div class="space-y-1">
                <label class="label-custom">Nominal Rp</label>
                <input type="number" id="pNom" class="modern-in text-lg font-black" placeholder="0">
            </div>
            <button onclick="simpanPon()" class="btn-primary">Simpan Transaksi</button>
        </section>

        <div class="space-y-3 pb-10">
            <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Riwayat Transaksi</h3>
            <div id="listPon" class="space-y-2">
                </div>
        </div>
    </main>

    <div id="modalEdit" class="fixed inset-0 bg-black/60 hidden items-center justify-center p-6 z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-7 space-y-4 shadow-2xl">
            <h3 class="text-center font-black text-slate-800 uppercase">Edit Transaksi</h3>
            <input type="hidden" id="editId">
            <input type="date" id="eTgl" class="modern-in">
            <select id="eKat" class="modern-in">
                <option value="Masuk">Masuk (+)</option>
                <option value="Keluar">Keluar (-)</option>
            </select>
            <input type="text" id="eKet" class="modern-in uppercase" placeholder="KETERANGAN">
            <input type="number" id="eNom" class="modern-in font-black" placeholder="NOMINAL">
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="closeModal()" class="p-4 rounded-2xl bg-slate-100 font-bold text-xs uppercase">Batal</button>
                <button onclick="updatePon()" class="p-4 rounded-2xl bg-orange-600 text-white font-bold text-xs uppercase shadow-lg shadow-orange-100">Update</button>
            </div>
        </div>
    </div>

    <script src="pon-script.js"></script>
</body>
              </html>
